<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if cls %}{{ cls.name }} - {% endif %}学生签到</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/design-system.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --canvas: #faf9f5;
      --surface-card: #efe9de;
      --surface-dark: #181715;
      --primary: #cc785c;
      --primary-active: #a9583e;
      --ink: #141413;
      --body: #3d3d3a;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --hairline: #e6dfd8;
      --on-primary: #ffffff;
      --on-dark: #faf9f5;
      --success: #5db872;
      --error: #c64545;
      --warning: #d4a017;
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--canvas);
      color: var(--body);
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* === Top Banner === */
    .signin-banner {
      background: var(--surface-dark);
      padding: 40px 24px 32px;
      position: relative;
      overflow: hidden;
    }
    .signin-banner::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,120,92,.15), transparent 70%);
      pointer-events: none;
    }
    .signin-banner-inner {
      max-width: 720px;
      margin: 0 auto;
      position: relative;
    }
    .banner-class-name {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -1px;
      color: var(--on-dark);
      margin: 0 0 8px 0;
      line-height: 1.15;
    }
    .banner-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .banner-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: #a09d96;
      font-size: 13px;
      font-weight: 500;
    }
    .banner-meta-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    /* === Form Area === */
    .signin-form-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px 32px;
    }
    .signin-form-inner {
      width: 100%;
      max-width: 520px;
    }

    #suggestions {
      max-height: 220px;
      overflow-y: auto;
      position: relative;
      z-index: 10;
      width: 100%;
      margin-top: 4px;
      background: #fff;
      border: 1px solid var(--hairline);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(20,20,19,.1);
      overflow: hidden;
      display: none;
    }
    .field-group {
      margin-bottom: 20px;
      position: relative;
    }
    .field-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .field-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 2px solid var(--hairline);
      font-size: 18px;
      line-height: 1.5;
      color: var(--ink);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
      box-sizing: border-box;
    }
    .field-input::placeholder { color: var(--muted-soft); }
    .field-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(204,120,92,.12);
    }
    .submit-btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: var(--on-primary);
      font-size: 16px;
      font-weight: 500;
      height: 52px;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover { background: var(--primary-active); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    .selected-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 8px;
      background: #fef3ec;
      border: 1px solid #f5d0b5;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--primary-active);
    }
    .selected-chip button {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background .15s;
    }
    .selected-chip button:hover { background: rgba(204,120,92,.1); }

    /* Status Panels */
    .status-panel {
      text-align: center;
      padding: 40px 24px;
      border-radius: 12px;
      border: 1px solid #b7e4c7;
      background: #f0fdf4;
    }
    .msg-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    .signin-footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted-soft);
      text-align: center;
    }

    /* Info collection panel */
    .info-panel {
      padding: 14px;
      background: #fef3ec;
      border: 1px solid #f5d0b5;
      border-radius: 8px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .signin-banner { padding: 32px 16px 24px; }
      .banner-class-name { font-size: 28px; }
      .signin-form-area { padding: 32px 16px 24px; }
    }
  </style>
</head>
<body>

  <!-- Top Banner -->
  <div class="signin-banner">
    <div class="signin-banner-inner">
      <h1 class="banner-class-name">
        {% if cls %}{{ cls.name }}{% else %}机房签到{% endif %}
      </h1>
      <div class="banner-meta">
        <div class="banner-meta-item">
          <span class="dot"></span>
          <span>{{ computer_name }}</span>
        </div>
        {% if cls %}
        <div class="banner-meta-item">
          <span style="font-weight: 600; color: var(--on-dark);">{{ studentCount }}</span>
          <span>名学生</span>
        </div>
        {% endif %}
        {% if not cls %}
        <div class="banner-meta-item" style="border-color: rgba(212,160,23,.3);">
          <span style="color: var(--warning);">!</span>
          <span>未指定班级，将搜索全部学生</span>
        </div>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- Form Area -->
  <div class="signin-form-area">
    <div class="signin-form-inner">

      <!-- 已签到状态 -->
      <div id="alreadySignedPanel" class="status-panel hidden">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full mb-4" style="background: #d1fae5;">
          <svg class="w-7 h-7" style="color: var(--success);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="text-base font-medium" style="color: #047857;" id="alreadySignedText"></p>
        <p class="text-sm mt-2" style="color: var(--muted);">本设备已完成签到，如需重新签到请联系老师</p>
      </div>

      <!-- 信息收集提示 -->
      <div id="infoCollectionPanel" class="hidden" style="margin-top: 16px;">
        <div class="info-panel">
          <div style="display: flex; align-items: flex-start; gap: 10px;">
            <svg style="width: 18px; height: 18px; color: var(--primary); flex-shrink: 0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <div style="flex: 1;">
              <p style="font-size: 12px; font-weight: 600; color: var(--ink); margin: 0 0 3px;">需要提交信息</p>
              <p style="font-size: 11px; color: var(--muted); margin: 0 0 10px;">老师要求提交相关信息，请点击下方按钮完成提交</p>
              <a id="infoSubmitLink" href="#" style="display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; color: var(--primary); text-decoration: none; padding: 6px 10px; border-radius: 6px; background: rgba(204,120,92,.1); transition: background .12s;" onmouseover="this.style.background='rgba(204,120,92,.2)'" onmouseout="this.style.background='rgba(204,120,92,.1)'">
                去提交
                <svg style="width: 12px; height: 12px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- 签到表单 -->
      <div id="signInForm">
        <div class="field-group">
          <label class="field-label">姓名</label>
          <input id="nameInput" type="text" autocomplete="off" placeholder="输入姓名片段搜索..." class="field-input" />
          <div id="suggestions"></div>
        </div>

        <div id="selectedInfo" class="selected-chip hidden">
          <span id="selectedText"></span>
          <button id="clearSelection">重新选择</button>
        </div>

        <button id="signinBtn" class="submit-btn">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          提交签到
        </button>

        <div id="msg" class="msg-box hidden"></div>
      </div>

      <div class="signin-footer">
        教师请输入密码登录管理端
      </div>

    </div>
  </div>

<script>
const CLASS_ID = {% if cls %}{{ cls.id }}{% else %}null{% endif %}
const STORAGE_KEY = 'signin_record' + (CLASS_ID ? '_' + CLASS_ID : '')

/**
 * HTML 转义，防止 XSS
 */
function esc(str) {
  if (str == null) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}

const input = document.getElementById('nameInput')
const suggestions = document.getElementById('suggestions')
const msg = document.getElementById('msg')
const selectedInfo = document.getElementById('selectedInfo')
const selectedText = document.getElementById('selectedText')
const signInForm = document.getElementById('signInForm')
const alreadySignedPanel = document.getElementById('alreadySignedPanel')

let selectedClassId = null
let selectedStudentId = null
let debounceTimer = null

function checkAlreadySigned() {
  const record = localStorage.getItem(STORAGE_KEY)
  if (!record) return
  try {
    const { name, className, signedAt, studentId } = JSON.parse(record)
    document.getElementById('alreadySignedText').textContent =
      `${name}（${className}）已于 ${signedAt} 签到成功`
    selectedStudentId = studentId || null
    alreadySignedPanel.classList.remove('hidden')
    signInForm.classList.add('hidden')
    checkInfoCollection()
  } catch (e) {
    localStorage.removeItem(STORAGE_KEY)
  }
}

async function checkInfoCollection() {
  if (!CLASS_ID) return
  try {
    const res = await fetch(`/api/info-collection?classId=${CLASS_ID}`)
    const data = await res.json()
    if (data.enabled && data.fields && data.fields.length > 0) {
      const record = localStorage.getItem(STORAGE_KEY)
      if (record) {
        const { name } = JSON.parse(record)
        const link = document.getElementById('infoSubmitLink')
        const studentIdParam = selectedStudentId ? `&studentId=${selectedStudentId}` : ''
        link.href = `/student/info-submit?classId=${CLASS_ID}&studentName=${encodeURIComponent(name)}${studentIdParam}`
        document.getElementById('infoCollectionPanel').classList.remove('hidden')
      }
    }
  } catch (e) {
    console.error('Check info collection failed:', e)
  }
}

function setMessage(text, ok = false) {
  msg.className = 'msg-box'
  msg.style.background = ok ? '#f0fdf4' : '#fef2f2'
  msg.style.color = ok ? '#047857' : '#c64545'
  msg.style.border = ok ? '1px solid #b7e4c7' : '1px solid #f5c6cb'
  msg.textContent = text
  msg.classList.remove('hidden')
}

function selectStudent(studentName, classId, className, homeClass, studentId, remark = '') {
  selectedClassId = classId
  selectedStudentId = studentId
  input.value = studentName
  const homeLabel = homeClass ? `${homeClass} · ` : ''
  const remarkBadge = remark ? `<span class="ml-2 px-2 py-0.5 text-[10px] font-semibold rounded-full bg-amber-100 text-amber-700 border border-amber-200">${esc(remark)}</span>` : ''
  selectedText.innerHTML = `已选择：<strong>${esc(studentName)}</strong>（${esc(homeLabel)}${esc(className)}）${remarkBadge}`
  selectedInfo.classList.remove('hidden')
  suggestions.style.display = 'none'
  suggestions.innerHTML = ''
}

document.getElementById('clearSelection').addEventListener('click', () => {
  selectedClassId = null
  input.value = ''
  selectedInfo.classList.add('hidden')
  selectedText.textContent = ''
  input.focus()
})

async function fetchSuggestions() {
  const q = input.value.trim()
  if (!q) { suggestions.style.display = 'none'; suggestions.innerHTML = ''; return }
  try {
    const url = '/api/students/match?q=' + encodeURIComponent(q) + (CLASS_ID ? '&classId=' + CLASS_ID : '')
    const res = await fetch(url)
    const data = await res.json()
    suggestions.innerHTML = ''
    if (!data.length) {
      const empty = document.createElement('div')
      empty.style.cssText = 'padding: 14px; text-align: center; font-size: 14px; color: var(--muted-soft);'
      empty.textContent = '未找到匹配学生'
      suggestions.appendChild(empty)
      suggestions.style.display = 'block'
      return
    }
    data.forEach(item => {
      const btn = document.createElement('button')
      btn.type = 'button'
      btn.style.cssText = 'display: block; width: 100%; text-align: left; padding: 10px 14px; font-size: 14px; border: none; background: none; cursor: pointer; border-bottom: 1px solid var(--hairline); color: var(--body); transition: background .1s;'
      btn.onmouseover = () => { btn.style.background = 'var(--canvas)' }
      btn.onmouseout = () => { btn.style.background = '' }
      const remarkBadge = item.remark ? `<span class="ml-2 px-2 py-0.5 text-[10px] font-semibold rounded-full bg-amber-100 text-amber-700 border border-amber-200">${esc(item.remark)}</span>` : ''
      btn.innerHTML = `<span style="font-weight:500; color: var(--ink);">${esc(item.studentName)} ${remarkBadge}</span><span style="color: var(--muted-soft); margin-left: 4px; font-size: 13px;">${esc(item.homeClass ? item.homeClass + ' · ' : '')}${esc(item.className)}</span>`
      btn.addEventListener('click', () => selectStudent(item.studentName, item.classId, item.className, item.homeClass, item.studentId, item.remark))
      suggestions.appendChild(btn)
    })
    suggestions.style.display = 'block'
  } catch (e) {
    suggestions.style.display = 'none'
  }
}

input.addEventListener('input', () => {
  if (selectedClassId !== null) { selectedClassId = null; selectedInfo.classList.add('hidden') }
  clearTimeout(debounceTimer)
  debounceTimer = setTimeout(fetchSuggestions, 200)
})

document.addEventListener('click', e => {
  if (!suggestions.contains(e.target) && e.target !== input) suggestions.style.display = 'none'
})

const signinBtn = document.getElementById('signinBtn')
signinBtn.addEventListener('click', async () => {
  const val = input.value.trim()
  if (!val) { setMessage('请先输入姓名或密码。', false); return }
  if (signinBtn.disabled) return

  signinBtn.disabled = true
  signinBtn.innerHTML = '<svg class="w-4 h-4" style="animation: spin 1s linear infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> 提交中...'

  try {
    // 先尝试教师密码登录
    const loginRes = await fetch('/api/teacher-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    })
    const loginData = await loginRes.json()
    if (loginData.ok) {
      window.location.href = loginData.redirect
      return
    }

    // 密码不匹配，走学生签到
    if (!selectedClassId) { setMessage('请从列表中选择学生', false); return }
    const res = await fetch('/api/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classId: selectedClassId, student_name: val })
    })
    const data = await res.json()
    setMessage(data.message, data.ok)
    if (data.ok) {
      const now = new Date()
      const pad = n => String(n).padStart(2, '0')
      const signedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`
      const match = selectedText.textContent.match(/（(.+)）$/)
      const className = match ? match[1] : ''
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: val, className, signedAt, studentId: selectedStudentId }))
      setTimeout(() => {
        document.getElementById('alreadySignedText').textContent =
          `${val}（${className}）已于 ${signedAt} 签到成功`
        alreadySignedPanel.classList.remove('hidden')
        signInForm.classList.add('hidden')
        checkInfoCollection()
      }, 1500)
    }
  } finally {
    signinBtn.disabled = false
    signinBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> 提交签到'
  }
})

checkAlreadySigned()
</script>
</body>
</html>
