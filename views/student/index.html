<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if cls %}{{ cls.name }} - {% endif %}学生签到</title>
  <style>
    /* 系统字体回退，避免外部依赖 */
    @font-face {
      font-family: 'JetBrains Mono';
      src: local('JetBrains Mono'), local('Consolas'), local('Monaco'), local('monospace');
    }
    @font-face {
      font-family: 'Inter';
      src: local('Inter'), local('-apple-system'), local('BlinkMacSystemFont'), local('Segoe UI'), local('PingFang SC'), local('Microsoft YaHei'), local(sans-serif);
    }
  </style>
  <link rel="stylesheet" href="/public/design-system.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    /* === Theme tokens === */
    :root {
      --primary: #cc785c;
      --primary-active: #a9583e;
      --success: #5db872;
      --error: #c64545;
      --warning: #d4a017;
      --amber: #e8a55a;
      --amber-text: #c4873e;
    }

    [data-theme="dark"] {
      --bg: #181715;
      --bg-glow: rgba(204,120,92,.06);
      --text: #faf9f5;
      --text-sub: #a09d96;
      --text-dim: #a09d96;
      --meta-bg: rgba(255,255,255,.05);
      --meta-border: rgba(255,255,255,.07);
      --input-bg: #252320;
      --input-bg-active: #1f1e1b;
      --input-border: rgba(255,255,255,.12);
      --input-border-sep: rgba(255,255,255,.08);
      --input-placeholder: #a09d96;
      --input-focus-shadow1: rgba(204,120,92,.15);
      --input-focus-shadow2: rgba(0,0,0,.3);
      --btn-text: #ffffff;
      --btn-disabled-bg: #1f1e1b;
      --btn-disabled-text: #a09d96;
      --suggestions-bg: #252320;
      --suggestions-border: rgba(255,255,255,.08);
      --suggestions-item-border: rgba(255,255,255,.06);
      --suggestions-hover: rgba(255,255,255,.04);
      --info-bg: rgba(204,120,92,.08);
      --info-border: rgba(204,120,92,.15);
      --info-link-bg: rgba(204,120,92,.12);
      --status-bg: rgba(93,184,114,.08);
      --status-border: rgba(93,184,114,.2);
      --status-icon-bg: rgba(93,184,114,.12);
      --msg-ok-bg: rgba(93,184,114,.1);
      --msg-ok-border: rgba(93,184,114,.2);
      --msg-err-bg: rgba(198,69,69,.1);
      --msg-err-border: rgba(198,69,69,.2);
      --selected-chip-bg: #252320;
      --selected-chip-border: rgba(255,255,255,.06);
      --remark-bg: rgba(232,165,90,.15);
      --remark-border: rgba(232,165,90,.25);
      --clock-opacity: .5;
      --clock-color: #a09d96;
      --toggle-bg: rgba(255,255,255,.06);
      --toggle-border: rgba(255,255,255,.08);
      --toggle-hover: rgba(255,255,255,.1);
    }

    [data-theme="light"] {
      --bg: #faf9f5;
      --bg-glow: rgba(204,120,92,.06);
      --text: #141413;
      --text-sub: #6c6a64;
      --text-dim: #6c6a64;
      --meta-bg: #efe9de;
      --meta-border: #e6dfd8;
      --input-bg: #faf9f5;
      --input-bg-active: #f5f0e8;
      --input-border: #e6dfd8;
      --input-border-sep: #e6dfd8;
      --input-placeholder: #8e8b82;
      --input-focus-shadow1: rgba(204,120,92,.2);
      --input-focus-shadow2: rgba(20,20,19,.06);
      --btn-text: #ffffff;
      --btn-disabled-bg: #efe9de;
      --btn-disabled-text: #6c6a64;
      --suggestions-bg: #ffffff;
      --suggestions-border: #e6dfd8;
      --suggestions-item-border: #e6dfd8;
      --suggestions-hover: #faf9f5;
      --info-bg: #fef3ec;
      --info-border: #f5d0b5;
      --info-link-bg: rgba(204,120,92,.1);
      --status-bg: #f0fdf4;
      --status-border: #b7e4c7;
      --status-icon-bg: #d1fae5;
      --msg-ok-bg: #f0fdf4;
      --msg-ok-border: #b7e4c7;
      --msg-err-bg: #fef2f2;
      --msg-err-border: #f5c6cb;
      --selected-chip-bg: #efe9de;
      --selected-chip-border: #e6dfd8;
      --remark-bg: rgba(232,165,90,.15);
      --remark-border: rgba(232,165,90,.3);
      --clock-opacity: .6;
      --clock-color: #6c6a64;
      --toggle-bg: rgba(0,0,0,.04);
      --toggle-border: rgba(0,0,0,.08);
      --toggle-hover: rgba(0,0,0,.08);
    }

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s;
    }

    /* === Theme toggle — top-right === */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--toggle-border);
      background: var(--toggle-bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, color .3s;
    }
    .theme-toggle:hover { background: var(--toggle-hover); }
    .theme-toggle svg { width: 18px; height: 18px; }
    [data-theme="dark"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: none; }

    /* === Centered content === */
    .signin-content {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 0 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* === Top section === */
    .signin-header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    .signin-header::before {
      content: '';
      position: absolute;
      top: -60%;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--bg-glow), transparent 65%);
      pointer-events: none;
    }
    .signin-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.2;
      color: var(--text);
      margin: 0 0 12px 0;
      position: relative;
      transition: color .3s;
    }
    .signin-sub {
      font-size: 14px;
      color: var(--text-sub);
      margin: 0 0 20px 0;
      line-height: 1.55;
      transition: color .3s;
    }
    .signin-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
    }
    .signin-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--meta-bg);
      border: 1px solid var(--meta-border);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 500;
      transition: background .3s, color .3s;
    }
    .signin-meta-item .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    /* === Form area === */
    .signin-body { position: relative; }
    .signin-body-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--text);
      margin: 0 0 4px 0;
      transition: color .3s;
    }
    .signin-body-sub {
      font-size: 14px;
      color: var(--text-sub);
      margin: 0 0 24px 0;
      line-height: 1.55;
      transition: color .3s;
    }

    /* Input */
    .field-group { margin-bottom: 16px; position: relative; }
    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      transition: color .3s;
    }
    .field-row {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      height: 48px;
      transition: border-color .15s, box-shadow .15s, background .3s;
      overflow: hidden;
    }
    .field-row:focus-within {
      border-color: rgba(204,120,92,.5);
      background: var(--input-bg-active);
      box-shadow: 0 0 0 3px var(--input-focus-shadow1), 0 2px 12px var(--input-focus-shadow2);
    }
    .field-input {
      flex: 1;
      min-width: 0;
      padding: 0 16px;
      border: none;
      background: transparent;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      height: 48px;
      box-sizing: border-box;
      outline: none;
      transition: color .3s, background .3s;
    }
    .field-input::placeholder { color: var(--input-placeholder); opacity: .5; transition: color .3s; }

    /* Clear button */
    .clear-btn {
      flex-shrink: 0;
      height: 100%;
      padding: 0 16px;
      border: none;
      border-left: 1px solid var(--input-border-sep);
      background: transparent;
      color: var(--primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      white-space: nowrap;
    }
    .clear-btn:hover { background: rgba(204,120,92,.15); }
    .clear-btn.hidden { display: none; }

    /* Suggestions */
    #suggestions {
      position: relative;
      z-index: 10;
      margin-top: 4px;
      background: var(--suggestions-bg);
      border: 1px solid var(--suggestions-border);
      border-radius: 10px;
      overflow: hidden;
      display: none;
      max-height: 220px;
      overflow-y: auto;
      transition: background .3s;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: var(--btn-text);
      font-size: 14px;
      font-weight: 500;
      height: 48px;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }
    .submit-btn:hover { background: var(--primary-active); box-shadow: 0 2px 12px rgba(204,120,92,.3); }
    .submit-btn:disabled {
      opacity: .4;
      background: var(--btn-disabled-bg);
      color: var(--btn-disabled-text);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Selected info */
    #selectedInfo { transition: color .3s; }

    /* Status panel */
    .status-panel {
      text-align: center;
      padding: 28px 24px;
      border-radius: 12px;
      border: 1px solid var(--status-border);
      background: var(--status-bg);
      transition: background .3s, border-color .3s;
    }
    .msg-box {
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: background .3s, border-color .3s, color .3s;
    }

    /* Info panel */
    .info-panel {
      margin-top: 12px;
      padding: 12px 14px;
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      border-radius: 8px;
      transition: background .3s, border-color .3s;
    }

    /* Footer */
    .signin-footer {
      margin-top: 40px;
      text-align: center;
    }
    #liveClock {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--clock-color);
      opacity: var(--clock-opacity);
      transition: color .3s;
    }

    @media (max-width: 768px) {
      .signin-content { padding: 0 16px; }
      .signin-title { font-size: 26px; }
      .signin-body-title { font-size: 18px; }
      .theme-toggle { top: 12px; right: 12px; }
    }
  </style>
</head>
<body>

<!-- Theme toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="切换主题">
  <svg class="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
  </svg>
  <svg class="icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
  </svg>
</button>

<div class="signin-content">

  <!-- Header -->
  <div class="signin-header">
    <h1 class="signin-title">
      {% if cls %}{{ cls.name }}{% else %}机房签到{% endif %}
    </h1>
    <p class="signin-sub">
      {% if cls %}{{ studentCount }} 名学生{% else %}未指定班级，将搜索全部学生{% endif %}
    </p>
    <div class="signin-meta">
      <div class="signin-meta-item">
        <span class="dot"></span>
        <span>{{ computer_name }}</span>
      </div>
      {% if not cls %}
      <div class="signin-meta-item" style="border-color: rgba(212,160,23,.25);">
        <span style="color: var(--warning);">!</span>
        <span>搜索全部学生</span>
      </div>
      {% endif %}
    </div>
  </div>

  <!-- Form -->
  <div class="signin-body">

    <p class="signin-body-sub">输入姓名、拼音首字母或全拼搜索，选择后点击签到</p>

    <!-- Already signed in -->
    <div id="alreadySignedPanel" class="status-panel hidden">
      <div style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;margin:0 auto 12px;background:var(--status-icon-bg);">
        <svg style="width:24px;height:24px;color:var(--success);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <p style="font-size:15px;font-weight:500;color:var(--text);margin:0;" id="alreadySignedText"></p>
      <p style="font-size:13px;margin-top:8px;color:var(--text-sub);margin-bottom:0;">本设备已完成签到，如需重新签到请联系老师</p>
    </div>

    <!-- Info collection prompt -->
    <div id="infoCollectionPanel" class="hidden">
      <div class="info-panel">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <svg style="width:16px;height:16px;color:var(--primary);flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <div style="flex:1;">
            <p style="font-size:12px;font-weight:600;color:var(--text);margin:0 0 3px;">需要提交信息</p>
            <p style="font-size:11px;color:var(--text-sub);margin:0 0 10px;">老师要求提交相关信息，请点击下方按钮完成提交</p>
            <a id="infoSubmitLink" href="#" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--primary);text-decoration:none;padding:6px 10px;border-radius:6px;background:var(--info-link-bg);">
              去提交
              <svg style="width:12px;height:12px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Sign in form -->
    <div id="signInForm">
      <div class="field-group">
        <div class="field-row">
          <input id="nameInput" type="text" autocomplete="off" placeholder="输入姓名片段搜索..." class="field-input" />
          <button id="clearSelection" class="clear-btn hidden">重新选择</button>
        </div>
        <div id="suggestions"></div>
      </div>

      <div id="selectedInfo" class="hidden" style="margin-bottom:16px;">
        <span id="selectedText" style="font-size:13px;color:var(--text-sub);"></span>
      </div>

      <button id="signinBtn" class="submit-btn">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        提交签到
      </button>

      <div id="msg" class="msg-box hidden"></div>
    </div>

    <div class="signin-footer">
      <span id="liveClock"></span>
    </div>

  </div>
</div>

<script>
const CLASS_ID = {% if cls %}{{ cls.id }}{% else %}null{% endif %}
const STORAGE_KEY = 'signin_record' + (CLASS_ID ? '_' + CLASS_ID : '')
const THEME_KEY = 'signin_theme'

/* === Theme === */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme)
  localStorage.setItem(THEME_KEY, theme)
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY)
  if (saved === 'light' || saved === 'dark') applyTheme(saved)
  else applyTheme('light')
})()
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme')
  applyTheme(current === 'dark' ? 'light' : 'dark')
})

function esc(str) {
  if (str == null) return ''
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')
}

const input = document.getElementById('nameInput')
input.focus()
const suggestions = document.getElementById('suggestions')
const msg = document.getElementById('msg')
const selectedInfo = document.getElementById('selectedInfo')
const selectedText = document.getElementById('selectedText')
const signInForm = document.getElementById('signInForm')
const alreadySignedPanel = document.getElementById('alreadySignedPanel')

let selectedClassId = null
let selectedStudentId = null
let debounceTimer = null

function checkAlreadySigned() {
  const record = localStorage.getItem(STORAGE_KEY)
  if (!record) return
  try {
    const { name, className, signedAt, studentId } = JSON.parse(record)
    document.getElementById('alreadySignedText').textContent =
      `${name}（${className}）已于 ${signedAt} 签到成功`
    selectedStudentId = studentId || null
    alreadySignedPanel.classList.remove('hidden')
    signInForm.classList.add('hidden')
    document.querySelector('.signin-body-sub')?.classList.add('hidden')
    checkInfoCollection()
  } catch (e) {
    localStorage.removeItem(STORAGE_KEY)
  }
}

async function checkInfoCollection() {
  if (!CLASS_ID) return
  try {
    const res = await fetch(`/api/info-collection?classId=${CLASS_ID}`)
    const data = await res.json()
    if (data.enabled && data.fields && data.fields.length > 0) {
      const record = localStorage.getItem(STORAGE_KEY)
      if (record) {
        const { name } = JSON.parse(record)
        const link = document.getElementById('infoSubmitLink')
        const studentIdParam = selectedStudentId ? `&studentId=${selectedStudentId}` : ''
        link.href = `/student/info-submit?classId=${CLASS_ID}&studentName=${encodeURIComponent(name)}${studentIdParam}`
        document.getElementById('infoCollectionPanel').classList.remove('hidden')
      }
    }
  } catch (e) {
    console.error('Check info collection failed:', e)
  }
}

function setMessage(text, ok = false) {
  msg.className = 'msg-box'
  msg.style.background = ok ? 'var(--msg-ok-bg)' : 'var(--msg-err-bg)'
  msg.style.color = ok ? 'var(--success)' : 'var(--error)'
  msg.style.border = ok ? '1px solid var(--msg-ok-border)' : '1px solid var(--msg-err-border)'
  msg.textContent = text
  msg.classList.remove('hidden')
}

function selectStudent(studentName, classId, className, homeClass, studentId, remark = '') {
  selectedClassId = classId
  selectedStudentId = studentId
  input.value = studentName
  const homeLabel = homeClass ? `${homeClass} · ` : ''
  const remarkBadge = remark ? `<span style="margin-left:6px;padding:1px 6px;font-size:10px;font-weight:600;border-radius:9999px;background:var(--remark-bg);color:var(--amber-text);border:1px solid var(--remark-border);">${esc(remark)}</span>` : ''
  selectedText.innerHTML = `已选择：<strong>${esc(studentName)}</strong>（${esc(homeLabel)}${esc(className)}）${remarkBadge}`
  selectedInfo.classList.remove('hidden')
  suggestions.style.display = 'none'
  suggestions.innerHTML = ''
  document.getElementById('clearSelection').classList.remove('hidden')
}

document.getElementById('clearSelection').addEventListener('click', () => {
  selectedClassId = null
  input.value = ''
  selectedInfo.classList.add('hidden')
  selectedText.textContent = ''
  document.getElementById('clearSelection').classList.add('hidden')
  input.focus()
})

async function fetchSuggestions() {
  const q = input.value.trim()
  if (!q) { suggestions.style.display = 'none'; suggestions.innerHTML = ''; return }
  try {
    const url = '/api/students/match?q=' + encodeURIComponent(q) + (CLASS_ID ? '&classId=' + CLASS_ID : '')
    const res = await fetch(url)
    const data = await res.json()
    suggestions.innerHTML = ''
    if (!data.length) {
      const empty = document.createElement('div')
      empty.style.cssText = 'padding: 14px; text-align: center; font-size: 14px; color: var(--text-sub);'
      empty.textContent = '未找到匹配学生'
      suggestions.appendChild(empty)
      suggestions.style.display = 'block'
      return
    }
    data.forEach(item => {
      const btn = document.createElement('button')
      btn.type = 'button'
      btn.style.cssText = 'display: block; width: 100%; text-align: left; padding: 10px 14px; font-size: 14px; border: none; background: none; cursor: pointer; border-bottom: 1px solid var(--suggestions-item-border); color: var(--text); transition: background .1s;'
      btn.onmouseover = () => { btn.style.background = 'var(--suggestions-hover)' }
      btn.onmouseout = () => { btn.style.background = '' }
      const remarkBadge = item.remark ? `<span style="margin-left:6px;padding:1px 6px;font-size:10px;font-weight:600;border-radius:9999px;background:var(--remark-bg);color:var(--amber-text);border:1px solid var(--remark-border);">${esc(item.remark)}</span>` : ''
      btn.innerHTML = `<span style="font-weight:500;">${esc(item.studentName)} ${remarkBadge}</span><span style="color:var(--text-sub);margin-left:6px;font-size:13px;">${esc(item.homeClass ? item.homeClass + ' · ' : '')}${esc(item.className)}</span>`
      btn.addEventListener('click', () => selectStudent(item.studentName, item.classId, item.className, item.homeClass, item.studentId, item.remark))
      suggestions.appendChild(btn)
    })
    suggestions.style.display = 'block'
  } catch (e) {
    suggestions.style.display = 'none'
  }
}

input.addEventListener('input', () => {
  if (selectedClassId !== null) {
    selectedClassId = null
    selectedInfo.classList.add('hidden')
    document.getElementById('clearSelection').classList.add('hidden')
  }
  clearTimeout(debounceTimer)
  debounceTimer = setTimeout(fetchSuggestions, 200)
})

document.addEventListener('click', e => {
  if (!suggestions.contains(e.target) && e.target !== input) suggestions.style.display = 'none'
})

const signinBtn = document.getElementById('signinBtn')

async function doSignin() {
  const val = input.value.trim()
  if (!val) { setMessage('请先输入姓名或密码。', false); return }
  if (signinBtn.disabled) return

  signinBtn.disabled = true
  signinBtn.innerHTML = '<svg class="w-4 h-4" style="animation: spin 1s linear infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> 提交中...'

  try {
    const loginRes = await fetch('/api/teacher-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    })
    const loginData = await loginRes.json()
    if (loginData.ok) {
      window.location.href = loginData.redirect
      return
    }

    if (!selectedClassId) { setMessage('请从列表中选择学生', false); return }
    const res = await fetch('/api/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classId: selectedClassId, studentName: val })
    })
    const data = await res.json()
    setMessage(data.message, data.ok)
    if (data.ok) {
      const now = new Date()
      const pad = n => String(n).padStart(2, '0')
      const signedAt = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`
      const match = selectedText.textContent.match(/（(.+)）$/)
      const className = match ? match[1] : ''
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: val, className, signedAt, studentId: selectedStudentId }))
      setTimeout(() => {
        document.getElementById('alreadySignedText').textContent =
          `${val}（${className}）已于 ${signedAt} 签到成功`
        alreadySignedPanel.classList.remove('hidden')
        signInForm.classList.add('hidden')
        document.querySelector('.signin-body-sub')?.classList.add('hidden')
        checkInfoCollection()
      }, 1500)
    }
  } finally {
    signinBtn.disabled = false
    signinBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> 提交签到'
  }
}

signinBtn.addEventListener('click', doSignin)

// Enter key: 已选学生直接签到；有建议列表自动选中第一条（仅一条时自动签到）；无匹配时尝试教师登录
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault()
    if (selectedClassId !== null) {
      doSignin()
    } else {
      const btns = suggestions.querySelectorAll('button')
      if (btns.length > 0) {
        const autoSubmit = btns.length === 1
        btns[0].click()
        if (autoSubmit) {
          setTimeout(() => { if (selectedClassId !== null) doSignin() }, 100)
        }
      } else {
        doSignin()
      }
    }
  }
})

checkAlreadySigned()

// Live clock
function updateClock() {
  const now = new Date()
  const pad = n => String(n).padStart(2, '0')
  const str = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`
  const el = document.getElementById('liveClock')
  if (el) el.textContent = str
}
updateClock()
setInterval(updateClock, 1000)
</script>
