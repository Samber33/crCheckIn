<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数据分析 - 管理员</title>
  <link rel="stylesheet" href="/public/admin.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
</head>
<body>

<header class="header-bar">
  <div class="header-inner">
    <div class="header-left">
      <a href="/admin" class="nav-link">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        管理面板
      </a>
      <span style="color: var(--hairline);">|</span>
      <span class="page-title text-lg">数据分析</span>
    </div>
    <div class="header-right">
      <button id="tagManageBtn" class="nav-link">预设标签</button>
      <a href="/admin/pool" class="nav-link">班级池</a>
      <a href="/admin/dashboard" class="nav-link">全局看板</a>
      <a href="/admin/analytics" class="nav-link active">数据分析</a>
      <a href="/admin/audit" class="nav-link">审计日志</a>
      <a href="/teacher/classes" class="nav-link">教师端</a>
      <form method="post" action="/teacher/logout" style="display: inline;">
        <button class="nav-link" type="submit">退出</button>
      </form>
    </div>
  </div>
</header>

<main class="admin-main">

  <div id="loadingView" class="loading">加载中...</div>
  <div id="dataView" style="display: none;">

    <!-- Summary -->
    <div class="summary-grid" id="summaryGrid"></div>

    <!-- Charts Row -->
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-header"><p class="chart-title">各教师班级数</p></div>
        <div class="chart-body"><div id="classChart"></div></div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><p class="chart-title">各教师签到量</p></div>
        <div class="chart-body"><div id="recordChart"></div></div>
      </div>
    </div>

    <!-- Teacher Table -->
    <div class="chart-card" style="margin-bottom: 24px;">
      <div class="chart-header"><p class="chart-title">教师详细数据</p></div>
      <div class="chart-body" style="overflow-x: auto;">
        <table class="admin-table" id="teacherTable"></table>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="chart-card">
      <div class="chart-header"><p class="chart-title">最近签到活动（Top 10）</p></div>
      <div class="chart-body">
        <ul class="activity-list" id="activityList"></ul>
      </div>
    </div>
  </div>
</main>

<!-- Preset Tag Management Modal -->
<div id="presetTagModal" class="modal-overlay">
  <div class="modal-card">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
      <div class="modal-title" style="margin: 0;">预设标签管理</div>
      <button id="presetTagClose" class="preset-close-btn">&times;</button>
    </div>
    <div id="presetTagList" class="preset-list"></div>
    <div style="display: flex; gap: 8px; align-items: center; padding-top: 12px; border-top: 1px solid var(--hairline); margin-top: 16px;">
      <input id="presetTagAddInput" class="input-field" type="text" placeholder="新标签名..." />
      <div id="presetColorPicker" class="preset-color-picker" style="display: flex; gap: 6px; flex-shrink: 0;"></div>
      <button id="presetTagAddBtn" class="preset-add-btn">添加</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function timeAgo(date) {
  const d = new Date(date)
  const now = new Date()
  const diff = Math.floor((now - d) / 1000)
  if (diff < 60) return '刚刚'
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前'
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前'
  return Math.floor(diff / 86400) + '天前'
}

async function loadData() {
  try {
    const res = await fetch('/admin/api/analytics')
    if (res.status === 401 || res.status === 403) { window.location.href = '/student'; return }
    if (!res.ok) { throw new Error('服务器返回 ' + res.status) }
    const data = await res.json()
    render(data)
  } catch (e) {
    document.getElementById('loadingView').style.display = 'none'
    document.getElementById('dataView').innerHTML = '<p style="text-align:center;padding:32px;color:var(--error);">加载失败：' + escHtml(e.message) + '</p>'
    document.getElementById('dataView').style.display = ''
  }
}

function render(data) {
  document.getElementById('loadingView').style.display = 'none'
  document.getElementById('dataView').style.display = ''

  // Summary
  const s = data.summary
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card"><div class="label">教师数</div><div class="value primary">${s.teacherCount}</div></div>
    <div class="summary-card"><div class="label">班级数</div><div class="value">${s.classCount}</div></div>
    <div class="summary-card"><div class="label">学生数</div><div class="value success">${s.totalStudents}</div></div>
    <div class="summary-card"><div class="label">签到总人次</div><div class="value info">${s.totalSignIns}</div></div>
    <div class="summary-card"><div class="label">历史批次数</div><div class="value">${s.totalSessions}</div></div>
  `

  // Teacher bar chart (class count)
  const teachers = data.teacherStats.filter(t => !t.isAdmin)
  const maxClasses = Math.max(...teachers.map(t => t.classCount), 1)
  document.getElementById('classChart').innerHTML = `<div class="bar-chart">${
    teachers.map(t => {
      const h = Math.max((t.classCount / maxClasses) * 120, 4)
      return `<div class="bar-col"><div class="bar" style="height:${h}px;"><span class="tooltip">${escHtml(t.username)}: ${t.classCount}个班级</span></div><div class="bar-label">${escHtml(t.username)}</div></div>`
    }).join('')
  }</div>`

  // Record chart
  const maxRecords = Math.max(...teachers.map(t => t.recordsCount), 1)
  document.getElementById('recordChart').innerHTML = `<div class="bar-chart">${
    teachers.map(t => {
      const h = Math.max((t.recordsCount / maxRecords) * 120, 4)
      return `<div class="bar-col"><div class="bar" style="height:${h}px;"><span class="tooltip">${escHtml(t.username)}: ${t.recordsCount}次签到</span></div><div class="bar-label">${escHtml(t.username)}</div></div>`
    }).join('')
  }</div>`

  // Teacher table
  document.getElementById('teacherTable').innerHTML = `<thead><tr>
    <th>教师</th><th>班级</th><th>批次</th><th>签到人次</th><th>学生</th>
  </tr></thead><tbody>${
    data.teacherStats.map(t => `<tr>
      <td class="name" style="font-weight: 500; color: var(--ink);">${escHtml(t.username)}${t.isAdmin ? ' <span style="color:var(--primary);font-size:11px;">(管理员)</span>' : ''}</td>
      <td>${t.classCount}</td>
      <td>${t.sessionsCount}</td>
      <td>${t.recordsCount}</td>
      <td>${t.studentsCount}</td>
    </tr>`).join('')
  }</tbody>`

  // Recent activity
  document.getElementById('activityList').innerHTML = data.recentActivity.length
    ? data.recentActivity.map(a => `
      <li class="activity-item">
        <span class="activity-dot"></span>
        <span class="activity-text"><strong>${escHtml(a.studentName)}</strong> 在 <strong>${escHtml(a.className)}</strong>（${escHtml(a.teacherUsername)}）签到</span>
        <span class="activity-time">${timeAgo(a.signedAt)}</span>
      </li>`).join('')
    : '<div class="empty-state">暂无签到记录</div>'
}

loadData()

// === Preset Tag Management ===
const TAG_COLORS = ['#cc785c','#5db872','#d4a017','#7c6cf0','#4a90d9','#e67e22']
let presetTags = []
let selectedAddColor = TAG_COLORS[0]

document.getElementById('tagManageBtn').addEventListener('click', () => {
  document.getElementById('presetTagModal').classList.add('active')
  loadPresetTags()
})
document.getElementById('presetTagClose').addEventListener('click', () => {
  document.getElementById('presetTagModal').classList.remove('active')
})
document.getElementById('presetTagModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) document.getElementById('presetTagModal').classList.remove('active')
})

function renderColorPicker() {
  const picker = document.getElementById('presetColorPicker')
  picker.innerHTML = TAG_COLORS.map(c =>
    `<div class="preset-color-option ${c === selectedAddColor ? 'selected' : ''}" data-color="${c}" style="background:${c};"></div>`
  ).join('')
}
renderColorPicker()

document.getElementById('presetColorPicker').addEventListener('click', (e) => {
  const opt = e.target.closest('.preset-color-option')
  if (!opt) return
  selectedAddColor = opt.dataset.color
  document.querySelectorAll('#presetColorPicker .preset-color-option').forEach(o => o.classList.remove('selected'))
  opt.classList.add('selected')
})

function showToast(text, ok = true) {
  const t = document.getElementById('toast')
  t.textContent = text
  t.className = `toast ${ok ? 'ok' : 'err'} show`
  setTimeout(() => t.classList.remove('show'), 2500)
}

async function loadPresetTags() {
  try {
    const res = await fetch('/admin/api/preset-tags')
    if (res.status === 401 || res.status === 403) { return }
    const data = await res.json()
    presetTags = data.tags || []
    renderPresetTags()
  } catch (e) {}
}

function renderPresetTags() {
  const container = document.getElementById('presetTagList')
  if (!presetTags.length) {
    container.innerHTML = '<div class="preset-empty">暂无预设标签</div>'
    return
  }
  container.innerHTML = presetTags.map(t => `
    <div class="preset-item" data-id="${t.id}">
      <span class="preset-color-dot" style="background:${t.color}"></span>
      <span class="preset-name">${escHtml(t.tag)}</span>
      <input class="preset-input name-input" value="${escHtml(t.tag)}" data-id="${t.id}" />
      <input class="preset-input color-input" value="${t.color}" data-id="${t.id}" style="width:60px;" />
      <button class="preset-save-btn" data-id="${t.id}">保存</button>
      <button class="preset-del-btn" data-id="${t.id}">删除</button>
    </div>
  `).join('')
}

document.getElementById('presetTagList').addEventListener('click', async (e) => {
  const saveBtn = e.target.closest('.preset-save-btn')
  const delBtn = e.target.closest('.preset-del-btn')
  if (saveBtn) {
    const id = parseInt(saveBtn.dataset.id)
    const nameInput = document.querySelector(`.name-input[data-id="${id}"]`)
    const colorInput = document.querySelector(`.color-input[data-id="${id}"]`)
    const tag = nameInput.value.trim()
    const color = colorInput.value.trim()
    if (!tag) { showToast('标签名不能为空', false); return }
    if (!/^#[0-9a-fA-F]{6}$/.test(color)) { showToast('颜色格式无效', false); return }
    try {
      const res = await fetch(`/admin/api/preset-tags/${id}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag, color }),
      })
      const data = await res.json()
      if (data.ok) { showToast('已保存', true); await loadPresetTags() }
      else showToast(data.message || '保存失败', false)
    } catch (e) { showToast('保存失败', false) }
  }
  if (delBtn) {
    const id = parseInt(delBtn.dataset.id)
    if (!confirm('确认删除此预设标签？')) return
    try {
      const res = await fetch(`/admin/api/preset-tags/${id}`, { method: 'DELETE' })
      const data = await res.json()
      if (data.ok) { showToast('已删除', true); await loadPresetTags() }
      else showToast(data.message || '删除失败', false)
    } catch (e) { showToast('删除失败', false) }
  }
})

document.getElementById('presetTagAddBtn').addEventListener('click', async () => {
  const input = document.getElementById('presetTagAddInput')
  const tag = input.value.trim()
  if (!tag) { showToast('标签名不能为空', false); return }
  try {
    const res = await fetch('/admin/api/preset-tags', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag, color: selectedAddColor }),
    })
    const data = await res.json()
    if (data.ok) { input.value = ''; showToast('已添加', true); await loadPresetTags() }
    else showToast(data.message || '添加失败', false)
  } catch (e) { showToast('添加失败', false) }
})

document.getElementById('presetTagAddInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('presetTagAddBtn').click()
})
</body>
</html>
