<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全局看板 - 管理员</title>
  <link rel="stylesheet" href="/public/admin.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
</head>
<body>

<header class="header-bar">
  <div class="header-inner">
    <div class="header-left">
      <a href="/admin" class="nav-link">
        <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
        管理面板
      </a>
      <span style="color: var(--hairline);">|</span>
      <span class="page-title text-lg">全局看板</span>
    </div>
    <div class="header-right">
      <button id="tagManageBtn" class="nav-link">预设标签</button>
      <a href="/admin/dashboard" class="nav-link active">全局看板</a>
      <a href="/admin/analytics" class="nav-link">数据分析</a>
      <a href="/admin/audit" class="nav-link">审计日志</a>
      <a href="/teacher/classes" class="nav-link">教师端</a>
      <form method="post" action="/teacher/logout" style="display: inline;">
        <button class="nav-link" type="submit">退出</button>
      </form>
    </div>
  </div>
</header>

<main class="admin-main">

  <!-- Banner -->
  <div class="compact-banner">
    <div>
      <h1 class="banner-title">全局看板</h1>
      <p class="banner-sub">实时监控所有班级签到状态</p>
    </div>
    <div class="banner-stats">
      <div class="banner-stat">
        <p class="banner-stat-value" id="statTeachers">-</p>
        <p class="banner-stat-label">教师</p>
      </div>
      <div class="banner-stat">
        <p class="banner-stat-value accent" id="statClasses">-</p>
        <p class="banner-stat-label">班级</p>
      </div>
      <div class="banner-stat">
        <p class="banner-stat-value" id="statSigned">-</p>
        <p class="banner-stat-label">当前签到</p>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="active">未归档</button>
    <button class="filter-btn" data-filter="archived">已归档</button>
    <button class="filter-btn" data-filter="签到中">签到中</button>
    <button class="filter-btn" data-filter="未开启">未开启</button>
  </div>

  <!-- Class Grid -->
  <div id="loadingView" class="loading">加载中...</div>
  <div id="classGrid" class="class-grid" style="display: none;"></div>
  <div id="emptyView" style="display: none; text-align: center; padding: 48px; color: var(--muted-soft);">
    暂无班级数据
  </div>
</main>

<!-- Preset Tag Management Modal -->
<div id="presetTagModal" class="modal-overlay">
  <div class="modal-card">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
      <div class="modal-title" style="margin: 0;">预设标签管理</div>
      <button id="presetTagClose" class="preset-close-btn">&times;</button>
    </div>
    <div id="presetTagList" class="preset-list"></div>
    <div style="display: flex; gap: 8px; align-items: center; padding-top: 12px; border-top: 1px solid var(--hairline); margin-top: 16px;">
      <input id="presetTagAddInput" class="input-field" type="text" placeholder="新标签名..." />
      <div id="presetColorPicker" class="preset-color-picker" style="display: flex; gap: 6px; flex-shrink: 0;"></div>
      <button id="presetTagAddBtn" class="preset-add-btn">添加</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let allClasses = []
let currentFilter = 'all'

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function showToast(text, ok = true) {
  const t = document.getElementById('toast')
  t.textContent = text
  t.className = `toast ${ok ? 'ok' : 'err'} show`
  setTimeout(() => t.classList.remove('show'), 2500)
}

function statusBadge(status) {
  const map = {
    '签到中': 'signing',
    '未开启': 'off',
  }
  const cls = map[status] || 'off'
  return `<span class="status-badge ${cls}">${escHtml(status)}</span>`
}

async function loadData() {
  const res = await fetch('/admin/api/classes')
  if (res.status === 401 || res.status === 403) { window.location.href = '/student'; return }
  const data = await res.json()
  allClasses = data.classes || []
  render()
}

function render() {
  let filtered
  if (currentFilter === 'all') {
    filtered = allClasses
  } else if (currentFilter === 'active') {
    filtered = allClasses.filter(c => !c.isArchived)
  } else if (currentFilter === 'archived') {
    filtered = allClasses.filter(c => c.isArchived)
  } else {
    filtered = allClasses.filter(c => c.signInStatus === currentFilter)
  }

  document.getElementById('loadingView').style.display = 'none'
  document.getElementById('classGrid').style.display = filtered.length ? 'grid' : 'none'
  document.getElementById('emptyView').style.display = filtered.length ? 'none' : 'block'

  // Stats
  const uniqueTeachers = new Set(allClasses.map(c => c.teacherId)).size
  const totalSigned = allClasses.reduce((sum, c) => sum + c.signedCount, 0)
  document.getElementById('statTeachers').textContent = uniqueTeachers
  document.getElementById('statClasses').textContent = allClasses.length
  document.getElementById('statSigned').textContent = totalSigned

  // Cards
  document.getElementById('classGrid').innerHTML = filtered.map(cls => {
    const attendanceRate = cls.studentCount > 0 ? ((cls.signedCount / cls.studentCount) * 100).toFixed(0) : '-'
    return `
    <a href="/teacher/classes/${cls.id}" class="class-card"${cls.isArchived ? ' style="opacity:.5;border-style:dashed;"' : ''} target="_blank">
      <div class="card-top">
        <span class="class-name">${escHtml(cls.name)}${cls.isArchived ? '<span style="margin-left:8px;font-size:11px;color:var(--muted-soft);background:var(--surface-card);padding:2px 8px;border-radius:9999px;">已归档</span>' : ''}</span>
        ${statusBadge(cls.signInStatus)}
      </div>
      <div style="margin-bottom: 10px;">
        <span class="teacher-tag">${escHtml(cls.teacherUsername)}</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val">${cls.studentCount}</div><div class="stat-lbl">总人数</div></div>
        <div class="stat"><div class="stat-val" style="color: var(--success);">${cls.signedCount}</div><div class="stat-lbl">已签到</div></div>
        <div class="stat"><div class="stat-val">${attendanceRate}%</div><div class="stat-lbl">出勤率</div></div>
      </div>
    </a>`
  }).join('')
}

// Filter
document.getElementById('filterBar').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn')
  if (!btn) return
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  currentFilter = btn.dataset.filter
  render()
})

// Auto refresh every 10s
loadData()
setInterval(loadData, 10000)

// === Preset Tag Management ===
const TAG_COLORS = ['#cc785c','#5db872','#d4a017','#7c6cf0','#4a90d9','#e67e22']
let presetTags = []
let selectedAddColor = TAG_COLORS[0]

document.getElementById('tagManageBtn').addEventListener('click', () => {
  document.getElementById('presetTagModal').classList.add('active')
  loadPresetTags()
})

document.getElementById('presetTagClose').addEventListener('click', () => {
  document.getElementById('presetTagModal').classList.remove('active')
})

document.getElementById('presetTagModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) document.getElementById('presetTagModal').classList.remove('active')
})

// Color picker
function renderColorPicker() {
  const picker = document.getElementById('presetColorPicker')
  picker.innerHTML = TAG_COLORS.map(c =>
    `<div class="preset-color-option ${c === selectedAddColor ? 'selected' : ''}" data-color="${c}" style="background:${c};"></div>`
  ).join('')
}
renderColorPicker()

document.getElementById('presetColorPicker').addEventListener('click', (e) => {
  const opt = e.target.closest('.preset-color-option')
  if (!opt) return
  selectedAddColor = opt.dataset.color
  document.querySelectorAll('#presetColorPicker .preset-color-option').forEach(o => o.classList.remove('selected'))
  opt.classList.add('selected')
})

async function loadPresetTags() {
  try {
    const res = await fetch('/admin/api/preset-tags')
    if (res.status === 401 || res.status === 403) { window.location.href = '/student'; return }
    const data = await res.json()
    presetTags = data.tags || []
    renderPresetTags()
  } catch (e) {}
}

function renderPresetTags() {
  const container = document.getElementById('presetTagList')
  if (!presetTags.length) {
    container.innerHTML = '<div class="preset-empty">暂无预设标签</div>'
    return
  }
  container.innerHTML = presetTags.map(t => `
    <div class="preset-item" data-id="${t.id}">
      <span class="preset-color-dot" style="background:${t.color}"></span>
      <span class="preset-name">${escHtml(t.tag)}</span>
      <input class="preset-input name-input" value="${escHtml(t.tag)}" data-id="${t.id}" />
      <input class="preset-input color-input" value="${t.color}" data-id="${t.id}" style="width:60px;" />
      <button class="preset-save-btn" data-id="${t.id}">保存</button>
      <button class="preset-del-btn" data-id="${t.id}">删除</button>
    </div>
  `).join('')
}

document.getElementById('presetTagList').addEventListener('click', async (e) => {
  const saveBtn = e.target.closest('.preset-save-btn')
  const delBtn = e.target.closest('.preset-del-btn')

  if (saveBtn) {
    const id = parseInt(saveBtn.dataset.id)
    const nameInput = document.querySelector(`.name-input[data-id="${id}"]`)
    const colorInput = document.querySelector(`.color-input[data-id="${id}"]`)
    const tag = nameInput.value.trim()
    const color = colorInput.value.trim()
    if (!tag) { showToast('标签名不能为空', false); return }
    if (!/^#[0-9a-fA-F]{6}$/.test(color)) { showToast('颜色格式无效', false); return }
    try {
      const res = await fetch(`/admin/api/preset-tags/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag, color }),
      })
      const data = await res.json()
      if (data.ok) { showToast('已保存', true); await loadPresetTags() }
      else showToast(data.message || '保存失败', false)
    } catch (e) { showToast('保存失败', false) }
  }

  if (delBtn) {
    const id = parseInt(delBtn.dataset.id)
    if (!confirm('确认删除此预设标签？')) return
    try {
      const res = await fetch(`/admin/api/preset-tags/${id}`, { method: 'DELETE' })
      const data = await res.json()
      if (data.ok) { showToast('已删除', true); await loadPresetTags() }
      else showToast(data.message || '删除失败', false)
    } catch (e) { showToast('删除失败', false) }
  }
})

document.getElementById('presetTagAddBtn').addEventListener('click', async () => {
  const input = document.getElementById('presetTagAddInput')
  const tag = input.value.trim()
  if (!tag) { showToast('标签名不能为空', false); return }
  try {
    const res = await fetch('/admin/api/preset-tags', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tag, color: selectedAddColor }),
    })
    const data = await res.json()
    if (data.ok) {
      input.value = ''
      showToast('已添加', true)
      await loadPresetTags()
    } else {
      showToast(data.message || '添加失败', false)
    }
  } catch (e) { showToast('添加失败', false) }
})

document.getElementById('presetTagAddInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('presetTagAddBtn').click()
})
</script>
</body>
</html>
