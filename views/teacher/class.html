<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 签到管理</title>
  <link rel="stylesheet" href="/public/design-system.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    /* ===== 页面特有样式 ===== */
    .layout-wrapper {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 1100px) {
      .layout-wrapper {
        grid-template-columns: 1fr;
      }
    }

    /* 左侧面板 - 固定 */
    .sidebar {
      position: sticky;
      top: 88px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 统计卡片区 */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-mini {
      background: linear-gradient(135deg, #ffffff, #fafaf9);
      border: 1px solid var(--slate-200);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
      transition: all 0.15s var(--ease-out);
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .stat-mini:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.04);
    }

    .stat-mini .label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--slate-500);
    }

    .stat-mini .value {
      font-size: 22px;
      font-weight: 700;
      color: var(--slate-800);
      margin-top: 4px;
    }

    .stat-mini.signed .value { color: var(--success-600); }
    .stat-mini.absent .value { color: var(--slate-400); }

    .progress-mini {
      height: 4px;
      background: var(--slate-100);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .progress-mini .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--success-500), var(--success-600));
      border-radius: 2px;
      transition: width 0.4s var(--ease-out);
    }

    /* 签到入口卡片 */
    .entry-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: linear-gradient(135deg, var(--brand-600), var(--brand-700));
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      transition: all 0.2s var(--ease-spring);
      box-shadow: 0 4px 12px rgba(201, 109, 58, 0.3);
      overflow: hidden;
    }

    .entry-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }

    .entry-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 109, 58, 0.4);
      background: linear-gradient(135deg, var(--brand-700), var(--brand-800));
    }

    .entry-card .icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
    }

    .entry-card .icon svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    .entry-card .content {
      flex: 1;
      min-width: 0;
    }

    .entry-card .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .entry-card .url {
      font-size: 10px;
      opacity: 0.85;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 按钮组 */
    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-block {
      width: 100%;
      justify-content: flex-start;
    }

    /* 右侧内容区 */
    .content-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 名单网格 - 支持 50+ 人 */
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      max-height: calc(100vh - 280px);
      overflow-y: auto;
      padding: 4px;
    }

    .roster-grid::-webkit-scrollbar {
      width: 6px;
    }

    .roster-grid::-webkit-scrollbar-track {
      background: var(--slate-50);
      border-radius: 3px;
    }

    .roster-grid::-webkit-scrollbar-thumb {
      background: var(--slate-300);
      border-radius: 3px;
    }

    .roster-grid::-webkit-scrollbar-thumb:hover {
      background: var(--slate-400);
    }

    .roster-card {
      position: relative;
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--slate-200);
      border-radius: 8px;
      transition: all 0.12s var(--ease-out);
    }

    .roster-card:hover {
      border-color: var(--slate-300);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transform: translateY(-1px);
    }

    .roster-card.signed {
      background: linear-gradient(135deg, #f0fdf4, #f5f9f7);
      border-color: rgba(87, 167, 120, 0.3);
    }

    .roster-card.dup {
      background: linear-gradient(135deg, #fef2f2, #fbf5f5);
      border-color: rgba(217, 110, 110, 0.3);
    }

    .roster-card .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .roster-card .name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.8);
    }

    .status-dot.signed { background: var(--success-500); }
    .status-dot.unsigned { background: var(--slate-300); }
    .status-dot.dup { background: var(--error-500); }

    .student-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--slate-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .student-class {
      font-size: 10px;
      color: var(--slate-400);
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .status-badge.signed {
      color: var(--success-700);
      background: var(--success-100);
    }

    .status-badge.unsigned {
      color: var(--slate-500);
      background: var(--slate-100);
    }

    .status-badge.dup {
      color: var(--error-600);
      background: var(--error-50);
    }

    .roster-card .meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .meta-info {
      font-size: 10px;
      color: var(--slate-400);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-info .ip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
    }

    .btn-revoke {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #fff;
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--error-600);
      cursor: pointer;
      transition: all 0.1s;
    }

    .btn-revoke:hover {
      background: var(--error-50);
      border-color: var(--error-400);
    }

    /* 历史批次列表 */
    .session-list {
      display: flex;
      flex-direction: column;
    }

    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--slate-100);
      transition: background 0.1s;
    }

    .session-item:last-child {
      border-bottom: none;
    }

    .session-item:hover {
      background: var(--slate-50);
    }

    .session-item .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--slate-700);
    }

    .session-item .count {
      font-size: 11px;
      color: var(--slate-400);
      margin-top: 2px;
    }

    .session-actions {
      display: flex;
      gap: 6px;
    }

    .session-actions .btn {
      padding: 4px 10px;
      font-size: 11px;
    }

    /* 顶栏增强 */
    .header-bar {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid rgba(231, 229, 228, 0.6);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      color: var(--slate-600);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s var(--ease-out);
    }

    .nav-link:hover {
      background: var(--slate-50);
      color: var(--slate-800);
    }

    .nav-link svg {
      color: var(--slate-400);
      transition: transform 0.15s;
    }

    .nav-link:hover svg {
      transform: translateX(-2px);
    }

    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--slate-800);
      background: linear-gradient(135deg, var(--slate-800), var(--slate-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 8px;
      color: var(--slate-600);
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s var(--ease-out);
    }

    .nav-action:hover {
      background: var(--slate-50);
      color: var(--slate-800);
    }

    /* 通知 toast */
    .toast-notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      animation: slideInRight 0.3s var(--ease-out);
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    /* 模态框 */
    .modal-overlay {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
    }

    /* 时间窗口面板 */
    .time-window-panel {
      background: linear-gradient(135deg, #fafaf9, #fff);
      border: 1px solid var(--slate-200);
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
    }

    .time-window-panel .field-group {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .time-window-panel label {
      display: block;
      font-size: 10px;
      color: var(--slate-500);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .time-window-panel input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--slate-200);
      font-size: 12px;
      transition: all 0.12s;
    }

    .time-window-panel input:focus {
      outline: none;
      border-color: var(--brand-400);
      box-shadow: 0 0 0 3px rgba(223, 138, 92, 0.1);
    }
  </style>
</head>
<body class="min-h-screen" style="background: var(--page-bg);">

  <!-- 顶栏 -->
  <header class="header-bar sticky top-0 z-20">
    <div class="max-w-[1400px] mx-auto px-5 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/teacher/classes" class="nav-link">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <div class="w-[1px] h-5 bg-slate-200"></div>
        <span class="nav-title">{{ cls.name }}</span>
      </div>
      <div class="flex items-center gap-1">
        <button id="pwdToggle" class="nav-action">修改密码</button>
        <form method="post" action="/teacher/logout">
          <button class="nav-action" type="submit">退出</button>
        </form>
      </div>
    </div>
  </header>

  <!-- 修改密码面板 -->
  <div id="pwdPanel" class="hidden header-bar border-t">
    <div class="max-w-[1400px] mx-auto px-5 py-4">
      <p class="text-sm font-medium text-slate-700 mb-3">修改密码</p>
      <div class="flex flex-wrap gap-2 items-end">
        <div>
          <label class="block text-xs text-slate-400 mb-1">旧密码</label>
          <input id="oldPwd" type="password" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 w-36" />
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">新密码</label>
          <input id="newPwd" type="password" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 w-36" />
        </div>
        <button id="changePwdBtn" class="btn btn-primary">确认修改</button>
      </div>
      <div id="pwdMsg" class="hidden mt-2 text-sm"></div>
    </div>
  </div>

  <main class="max-w-[1400px] mx-auto px-5 py-6">
    <div class="layout-wrapper">

      <!-- 左侧栏 -->
      <aside class="sidebar">

        <!-- 统计卡片区 -->
        <div class="card p-3">
          <div class="stats-row">
            <div class="stat-mini">
              <div class="label">总人数</div>
              <div id="totalCount" class="value">0</div>
            </div>
            <div class="stat-mini signed">
              <div class="label">已签到</div>
              <div id="signedCount" class="value">0</div>
              <div class="progress-mini">
                <div id="progressBar" class="bar" style="width:0%"></div>
              </div>
            </div>
            <div class="stat-mini absent">
              <div class="label">未签到</div>
              <div id="absentCount" class="value">0</div>
            </div>
          </div>
        </div>

        <!-- 签到入口 -->
        <a href="/student?classId={{ cls.id }}" target="_blank" class="entry-card">
          <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </div>
          <div class="content">
            <div class="title">学生签到入口</div>
            <div class="url">/student?classId={{ cls.id }}</div>
          </div>
        </a>

        <!-- 主要操作 -->
        <div class="card p-4">
          <p class="section-label mb-3">快捷操作</p>
          <div class="btn-stack">
            <a href="/teacher/classes/{{ cls.id }}/seats" class="btn btn-primary btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
              </svg>
              座位表
            </a>
            <a href="/teacher/classes/{{ cls.id }}/students" class="btn btn-secondary btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              学生管理
            </a>
            <a href="/teacher/info?classId={{ cls.id }}" class="btn btn-secondary btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              信息收集
            </a>
          </div>
        </div>

        <!-- 数据管理 -->
        <div class="card p-4">
          <p class="section-label mb-3">数据</p>
          <div class="btn-stack">
            <button id="importBtn" class="btn btn-secondary btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
              </svg>
              导入名单
            </button>
            <a href="/api/export?classId={{ cls.id }}" class="btn btn-secondary btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
              导出记录
            </a>
            <a href="/api/stats/export?classId={{ cls.id }}" class="btn btn-secondary btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              导出统计
            </a>
          </div>
        </div>

        <!-- 签到时间 -->
        <div class="card p-4">
          <div class="flex items-center justify-between mb-3">
            <p class="section-label mb-0">签到时间</p>
            <span id="windowText" class="text-xs text-slate-400">不限</span>
          </div>
          <div class="time-window-panel" style="margin:0; background: var(--slate-50); border-color: var(--slate-200);">
            <div class="field-group">
              <div style="flex:1">
                <label>开始</label>
                <input id="startTime" type="datetime-local" />
              </div>
              <div style="flex:1">
                <label>结束</label>
                <input id="endTime" type="datetime-local" />
              </div>
            </div>
            <div class="action-group" style="margin-top: 8px;">
              <button id="saveWindow" class="btn btn-primary" style="flex:1; font-size: 12px; padding: 6px 10px;">保存</button>
              <button id="clearWindow" class="btn btn-secondary" style="flex:1; font-size: 12px; padding: 6px 10px;">清除</button>
            </div>
          </div>
        </div>

        <!-- 危险操作 -->
        <div class="card p-4" style="border-color: rgba(217, 110, 110, 0.3);">
          <p class="section-label mb-3" style="color: var(--error-600);">危险操作</p>
          <div class="btn-stack">
            <button id="resetBtn" class="btn btn-danger btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              归档重置
            </button>
            <button id="clearRosterBtn" class="btn btn-danger btn-block">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              清空名单
            </button>
          </div>
          <p class="mt-3 text-xs text-slate-400 leading-relaxed">操作前请谨慎确认，此操作不可恢复。</p>
        </div>

      </aside>

      <!-- 右侧内容区 -->
      <div class="content-area">

        <!-- 出勤统计面板 -->
        <div id="statsPanel" class="hidden card overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <p class="text-sm font-medium text-slate-700">出勤统计</p>
            <button id="statsClose" class="text-slate-400 hover:text-slate-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div id="statsContent" class="px-5 py-8 text-center text-sm text-slate-400">加载中...</div>
        </div>

        <!-- 通知 -->
        <div id="msg" class="hidden toast-notification px-4 py-3 rounded-xl text-sm font-medium"></div>

        <!-- 签到名单 -->
        <div class="card overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <p class="text-sm font-medium text-slate-700">签到名单</p>
              <span id="rosterBadge" class="text-xs text-slate-400"></span>
              <span id="rosterDate" class="text-xs text-slate-300"></span>
            </div>
            <button id="statsToggle" class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;">
              <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
              </svg>
              统计
            </button>
          </div>
          <div class="p-4" style="background: var(--slate-50);">
            <div id="rosterCompactGrid" class="roster-grid"></div>
          </div>
        </div>

        <!-- 历史批次 -->
        <div class="card overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <p class="text-sm font-medium text-slate-700">历史批次</p>
            <span id="sessionCount" class="text-xs text-slate-400"></span>
          </div>
          <div id="sessionList" class="session-list">
            <div class="px-5 py-8 text-center text-sm text-slate-400">暂无历史批次</div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- 隐藏 input -->
  <input type="file" id="importFile" accept=".xlsx,.xls" class="hidden" />

  <!-- 详情弹窗 -->
  <div id="sessionModal" class="hidden modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-white">
        <p id="modalTitle" class="text-sm font-semibold text-slate-800"></p>
        <button id="modalClose" class="text-slate-400 hover:text-slate-600 transition text-xl leading-none">&times;</button>
      </div>
      <div class="overflow-auto flex-1">
        <table class="w-full text-sm">
          <thead class="sticky top-0 bg-white shadow-sm">
            <tr class="text-xs text-slate-400 border-b border-slate-100">
              <th class="text-left px-5 py-3 font-medium">姓名</th>
              <th class="text-left px-5 py-3 font-medium">行政班级</th>
              <th class="text-left px-5 py-3 font-medium">状态</th>
              <th class="text-left px-5 py-3 font-medium">IP</th>
              <th class="text-left px-5 py-3 font-medium">时间</th>
            </tr>
          </thead>
          <tbody id="modalBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
const CLASS_ID = {{ cls.id }}
const msg = document.getElementById('msg')

function notify(text, ok = true) {
  msg.className = `toast-notification px-4 py-3 rounded-xl text-sm font-medium shadow-lg border ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-200'
    : 'bg-red-50 text-red-600 border border-red-200'}`
  msg.textContent = text
  msg.classList.remove('hidden')
  setTimeout(() => {
    msg.style.animation = 'fadeOut 0.2s forwards'
    setTimeout(() => msg.classList.add('hidden'), 200)
  }, 2500)
}

async function parseResponse(res) {
  if (res.status === 401) { window.location.href = '/student'; return null }
  if (!res.ok) { const t = await res.text(); console.error('API error', res.status, t); return null }
  return res.json()
}

function formatHomeClass(homeClass) {
  const value = String(homeClass || '').trim()
  if (!value) return ''
  return value.includes('班') ? value : `${value}班`
}

function formatRosterDate(value) {
  const date = value ? new Date(value) : new Date()
  if (Number.isNaN(date.getTime())) return ''
  const year = date.getFullYear()
  const month = String(date.getMonth() + 1).padStart(2, '0')
  const day = String(date.getDate()).padStart(2, '0')
  return `${year}-${month}-${day}`
}

function formatSignedTime(value) {
  if (!value) return '-'
  const date = new Date(value)
  if (Number.isNaN(date.getTime())) {
    const match = String(value).match(/(\d{2}:\d{2}:\d{2})/)
    return match ? match[1] : String(value)
  }
  return date.toLocaleTimeString('zh-CN', { hour12: false })
}

function renderRosterCompact(roster, ipCount) {
  const grid = document.getElementById('rosterCompactGrid')
  grid.innerHTML = ''

  roster.forEach(r => {
    const isSigned = r.status === '已签到'
    const dupIp = ipCount[(r.computerName || '').trim()] > 1
    const item = document.createElement('div')
    item.className = `roster-card ${dupIp ? 'dup' : isSigned ? 'signed' : ''}`
    const dotClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const badgeClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusText = dupIp ? '重复 IP' : isSigned ? '已签到' : '未签到'

    const revokeBtn = (isSigned && r.recordId)
      ? `<button onclick="revokeRecord(${r.recordId})" class="btn-revoke">撤销</button>`
      : '<span></span>'

    item.innerHTML = `
      <div class="row">
        <div class="name-row">
          <span class="status-dot ${dotClass}"></span>
          <span class="student-name">${r.studentName}</span>
          <span class="student-class">${formatHomeClass(r.homeClass) || ''}</span>
        </div>
        <span class="status-badge ${badgeClass}">${statusText}</span>
      </div>
      <div class="meta">
        <span class="meta-info">
          <span class="ip">${r.computerName || '-'}</span>
          <span>/</span>
          <span>${isSigned ? formatSignedTime(r.signedAt) : '-'}</span>
        </span>
        ${revokeBtn}
      </div>`
    grid.appendChild(item)
  })

  if (!roster.length) {
    grid.innerHTML = '<div class="col-span-full px-4 py-12 text-sm text-slate-400 text-center bg-white rounded-xl border border-dashed border-slate-200">暂无学生</div>'
  }
}

async function refreshStatus() {
  const res = await fetch(`/api/status?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  if (!Array.isArray(data.roster)) return

  const total = data.totalCount, signed = data.signedCount
  document.getElementById('totalCount').textContent = total
  document.getElementById('signedCount').textContent = signed
  document.getElementById('absentCount').textContent = data.absentCount
  document.getElementById('progressBar').style.width = total > 0 ? (signed / total * 100) + '%' : '0%'
  document.getElementById('rosterBadge').textContent = `共 ${total} 人`
  const firstSignedAt = data.roster.find(r => r.signedAt)?.signedAt
  document.getElementById('rosterDate').textContent = formatRosterDate(firstSignedAt)

  const wt = document.getElementById('windowText')
  wt.textContent = (data.window.start || data.window.end)
    ? `${data.window.start || '不限'} 至 ${data.window.end || '不限'}`
    : '不限'

  const ipCount = {}
  data.roster.forEach(r => { const ip = (r.computerName||'').trim(); if (ip && ip!=='-') ipCount[ip]=(ipCount[ip]||0)+1 })
  renderRosterCompact(data.roster, ipCount)
}

async function refreshSessions() {
  const res = await fetch(`/api/sessions?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  const list = document.getElementById('sessionList')
  document.getElementById('sessionCount').textContent = data.length ? `共 ${data.length} 批次` : ''
  if (!data.length) { list.innerHTML = '<div class="px-5 py-8 text-center text-sm text-slate-400">暂无历史批次</div>'; return }
  list.innerHTML = data.map(s => `
    <div class="session-item">
      <div>
        <div class="label">${s.label}</div>
        <div class="count">签到人数：${s.count}</div>
      </div>
      <div class="session-actions">
        <button onclick="openSession(${s.id}, this.dataset.label)" data-label="${s.label.replace(/"/g,'&quot;')}"
          class="btn btn-secondary">查看</button>
        <a href="/teacher/sessions/${s.id}/seats" class="btn btn-secondary">座位表</a>
        <a href="/api/sessions/${s.id}/export" class="btn btn-secondary">导出</a>
        <button onclick="deleteSessionItem(${s.id}, this.dataset.label)" data-label="${s.label.replace(/"/g,'&quot;')}"
          class="btn btn-danger">删除</button>
      </div>
    </div>`).join('')
}

async function openSession(sessionId, label) {
  const res = await fetch(`/api/sessions/${sessionId}`)
  const data = await parseResponse(res)
  if (!data) return
  document.getElementById('modalTitle').textContent = label
  document.getElementById('modalBody').innerHTML = (data.roster||[]).map(r => `
    <tr class="border-b border-slate-50 last:border-0">
      <td class="px-5 py-3 text-slate-800 font-medium">${r.studentName}</td>
      <td class="px-5 py-3 text-xs text-slate-400">${formatHomeClass(r.homeClass)}</td>
      <td class="px-5 py-3 text-xs ${r.status === '已签到' ? 'text-emerald-600 font-semibold' : 'text-slate-400'}">${r.status === '已签到' ? '✓ 已签到' : '✗ 未签到'}</td>
      <td class="px-5 py-3 text-xs font-mono text-slate-400">${r.computerName || '-'}</td>
      <td class="px-5 py-3 text-xs text-slate-400">${r.signedAt || '-'}</td>
    </tr>`).join('')
  document.getElementById('sessionModal').classList.remove('hidden')
}

async function deleteSessionItem(sessionId, label) {
  if (!confirm(`确认删除历史批次「${label}」？此操作不可恢复。`)) return
  const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message || '历史批次已删除', true)
  document.getElementById('sessionModal').classList.add('hidden')
  await refreshSessions()
  const statsPanel = document.getElementById('statsPanel')
  if (!statsPanel.classList.contains('hidden')) {
    await loadStats()
  }
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('sessionModal').classList.add('hidden')
})

document.getElementById('statsClose').addEventListener('click', () => {
  document.getElementById('statsPanel').classList.add('hidden')
})

document.getElementById('statsToggle').addEventListener('click', async () => {
  const panel = document.getElementById('statsPanel')
  panel.classList.toggle('hidden')
  if (!panel.classList.contains('hidden')) await loadStats()
})

async function loadStats() {
  const content = document.getElementById('statsContent')
  content.innerHTML = '<div class="py-8 text-center text-sm text-slate-400">加载中...</div>'
  const res = await fetch('/api/stats?classId=' + CLASS_ID)
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.students || !data.students.length) {
    content.innerHTML = '<div class="py-8 text-center text-sm text-slate-400">暂无历史批次数据</div>'; return
  }
  content.innerHTML = `<div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead><tr class="text-xs text-slate-400 border-b border-slate-50">
        <th class="text-left px-5 py-3 font-medium">姓名</th>
        <th class="text-left px-5 py-3 font-medium">行政班级</th>
        <th class="text-center px-5 py-3 font-medium">签到</th>
        <th class="text-center px-5 py-3 font-medium">缺勤</th>
        <th class="text-center px-5 py-3 font-medium">出勤率</th>
      </tr></thead>
      <tbody>${data.students.map(s => {
        const rate = parseFloat(s.rate)
        const color = rate >= 80 ? 'text-emerald-600' : rate >= 60 ? 'text-amber-500' : 'text-red-500'
        return `<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50">
          <td class="px-5 py-3 font-medium text-slate-800">${s.name}</td>
          <td class="px-5 py-3 text-xs text-slate-400">${formatHomeClass(s.homeClass)}</td>
          <td class="px-5 py-3 text-center text-slate-600">${s.signedCount}</td>
          <td class="px-5 py-3 text-center text-slate-400">${s.absentCount}</td>
          <td class="px-5 py-3 text-center font-semibold ${color}">${s.rate}%</td>
        </tr>`
      }).join('')}</tbody>
    </table>
    <p class="px-5 py-3 text-xs text-slate-400 border-t border-slate-50">共 ${data.totalSessions} 个历史批次</p>
  </div>`
}

async function revokeRecord(recordId) {
  if (!confirm('确认撤销该签到记录？')) return
  const res = await fetch('/api/signin/' + recordId, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { notify(data.message, false); return }
  notify('已撤销', true)
  refreshStatus()
}

document.getElementById('pwdToggle').addEventListener('click', () => {
  document.getElementById('pwdPanel').classList.toggle('hidden')
})

document.getElementById('changePwdBtn').addEventListener('click', async () => {
  const pwdMsg = document.getElementById('pwdMsg')
  const res = await fetch('/api/change-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ old_password: document.getElementById('oldPwd').value, new_password: document.getElementById('newPwd').value })
  })
  const data = await parseResponse(res)
  if (!data) return
  pwdMsg.className = `mt-2 text-sm ${data.ok ? 'text-emerald-600' : 'text-red-500'}`
  pwdMsg.textContent = data.message
  pwdMsg.classList.remove('hidden')
  if (data.ok) { document.getElementById('oldPwd').value = ''; document.getElementById('newPwd').value = '' }
})

document.getElementById('saveWindow').addEventListener('click', async () => {
  const res = await fetch('/api/window', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, start_time: document.getElementById('startTime').value||null, end_time: document.getElementById('endTime').value||null })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

document.getElementById('clearWindow').addEventListener('click', async () => {
  document.getElementById('startTime').value = ''
  document.getElementById('endTime').value = ''
  const res = await fetch('/api/window', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, start_time: null, end_time: null })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify('已清除时间限制', data.ok)
  refreshStatus()
})

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('确认归档当前签到记录并重置？')) return
  const res = await fetch('/api/reset', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
  refreshSessions()
})

document.getElementById('clearRosterBtn').addEventListener('click', async () => {
  if (!confirm('确认清空名单及全部签到记录？此操作不可恢复！')) return
  const res = await fetch('/api/clear-roster', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click()
})
document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const fd = new FormData()
  fd.append('file', file)
  fd.append('classId', CLASS_ID)
  notify('导入中...', true)
  const res = await fetch('/api/import', { method: 'POST', body: fd })
  const data = await parseResponse(res)
  e.target.value = ''
  if (!data) return
  notify(data.message, data.ok)
  if (data.ok) refreshStatus()
})

refreshStatus()
refreshSessions()
setInterval(refreshStatus, 4000)
</script>
</body>
</html>
