<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 签到管理</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --canvas: #faf9f5;
      --surface-card: #efe9de;
      --surface-dark: #181715;
      --primary: #cc785c;
      --primary-active: #a9583e;
      --ink: #141413;
      --body: #3d3d3a;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --hairline: #e6dfd8;
      --on-primary: #ffffff;
      --on-dark: #faf9f5;
      --success: #5db872;
      --error: #c64545;
      --warning: #d4a017;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--body);
      margin: 0;
    }
    .hidden { display: none !important; }

    /* === Header === */
    .header-bar {
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all .15s ease;
      text-decoration: none;
    }
    .nav-link:hover { background: var(--surface-card); color: var(--ink); }
    .page-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--ink);
    }
    .nav-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all .15s ease;
      border: none;
      background: none;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-action:hover { background: var(--surface-card); color: var(--ink); }

    /* === Compact Banner === */
    .compact-banner {
      background: var(--surface-dark);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: stretch;
      gap: 16px;
      flex-wrap: wrap;
    }
    .banner-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--on-dark);
      margin: 0;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .banner-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .banner-stat {
      text-align: center;
      padding: 8px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .banner-stat-label {
      font-size: 11px;
      color: #8e8b82;
      margin: 0;
    }
    .banner-stat-value {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--on-dark);
      margin: 4px 0 0;
      line-height: 1;
    }
    .banner-stat-value.accent { color: var(--primary); }
    .banner-stat-value.muted { color: #8e8b82; }
    .signin-badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-radius: 10px;
      background: var(--primary);
      color: var(--on-primary);
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      transition: all .15s;
      flex: 1 1 0;
      justify-content: center;
      min-width: 0;
      box-sizing: border-box;
      box-shadow: 0 4px 14px rgba(204,120,92,.35);
    }
    .signin-badge:hover { background: var(--primary-active); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(204,120,92,.45); }
    .reset-badge {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-radius: 10px;
      background: #e8813b;
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      flex: 1 1 0;
      justify-content: center;
      min-width: 0;
      box-sizing: border-box;
      box-shadow: 0 4px 14px rgba(232,129,59,.35);
    }
    .reset-badge:hover { background: #d4702e; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,129,59,.45); }
    .signin-url {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255,255,255,.18);
      padding: 4px 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
    }
    .signin-url .classid {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 1px;
    }

    /* === Layout === */
    .page-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items: start;
    }

    /* === Card === */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--hairline);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }

    /* === Roster === */
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      padding: 16px;
    }
    .roster-item {
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--canvas);
      transition: border-color .12s, box-shadow .12s;
    }
    .roster-item:hover {
      box-shadow: 0 2px 8px rgba(20,20,19,.05);
    }
    .roster-item.signed { border-color: #b7e4c7; background: #f0fdf4; }
    .roster-item.dup { border-color: #f5c6cb; background: #fef2f2; }
    .roster-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .roster-name-wrap {
      min-width: 0;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .roster-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .roster-dot.signed { background: var(--success); }
    .roster-dot.unsigned { background: var(--muted-soft); }
    .roster-dot.dup { background: var(--error); }
    .roster-student-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .roster-home-class {
      font-size: 10px;
      color: var(--muted-soft);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .roster-status {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 9999px;
      line-height: 1;
    }
    .roster-status.signed { color: #047857; background: #d1fae5; }
    .roster-status.unsigned { color: var(--muted); background: var(--surface-card); }
    .roster-status.dup { color: var(--error); background: #fecaca; }
    .roster-tags {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }
    .roster-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      color: #fff;
      line-height: 1.4;
    }
    .roster-tag-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px dashed var(--hairline);
      background: transparent;
      color: var(--muted-soft);
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .roster-tag-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(204,120,92,.06);
    }
    .roster-tag-btn:active {
      transform: scale(0.9);
      background: rgba(204,120,92,.12);
    }
    .tag-preset-btn:hover { opacity: .85; }
    .roster-meta {
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .roster-meta-text {
      font-size: 10px;
      color: var(--muted-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .roster-meta-text .ip { color: var(--muted); }
    .roster-meta-text .time { color: #047857; }
    .roster-meta-text.dup .ip,
    .roster-meta-text.dup .time { color: var(--error); }
    .roster-meta-text .sep { color: var(--hairline); margin: 0 3px; }
    .roster-revoke {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #f5c6cb;
      background: #fef2f2;
      color: var(--error);
      transition: background .12s;
    }
    .roster-revoke:hover { background: #fecaca; }
    .roster-empty {
      grid-column: 1 / -1;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted-soft);
      border: 1px dashed var(--hairline);
      border-radius: 8px;
    }

    /* === Stats Panel === */
    .stats-panel {
      margin-bottom: 16px;
    }
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .stats-table thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--hairline);
      background: var(--canvas);
      box-sizing: border-box;
    }
    .stats-table thead th.center { text-align: center; }
    .stats-table tbody tr {
      border-bottom: 1px solid var(--hairline);
      transition: background .12s;
    }
    .stats-table tbody tr:hover { background: var(--surface-card); }
    .stats-table tbody tr:last-child { border-bottom: none; }
    .stats-table td {
      padding: 10px 16px;
      color: var(--body);
      box-sizing: border-box;
      text-align: left;
    }
    .stats-table td.name {
      font-weight: 500;
      color: var(--ink);
    }
    .stats-table td.muted {
      font-size: 12px;
      color: var(--muted-soft);
    }
    .stats-table td.center { text-align: center; }
    .stats-table td.rate {
      text-align: center;
      font-weight: 600;
      font-family: Georgia, serif;
    }
    .stats-table td.rate.high { color: var(--success); }
    .stats-table td.rate.mid { color: var(--warning); }
    .stats-table td.rate.low { color: var(--error); }
    .stats-footer {
      padding: 10px 16px;
      font-size: 11px;
      color: var(--muted-soft);
      border-top: 1px solid var(--hairline);
      background: var(--canvas);
    }
    /* === Sidebar === */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: sticky;
      top: 80px;
    }
    .sidebar-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid var(--hairline);
      overflow: hidden;
    }
    .sidebar-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--hairline);
    }
    .sidebar-card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
      letter-spacing: 0.3px;
    }
    .sidebar-card-body { padding: 12px 16px; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      transition: background .12s;
    }
    .sidebar-link:hover { background: var(--canvas); }
    .sidebar-link-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background .12s;
    }
    .sidebar-btn:hover { background: var(--canvas); }
    .sidebar-btn.danger { color: var(--error); }
    .sidebar-btn.danger:hover { background: #fef2f2; }
    .sidebar-divider { height: 1px; background: var(--hairline); margin: 4px 0; }
    .sidebar-help {
      font-size: 11px;
      color: var(--muted-soft);
      line-height: 1.5;
      margin-top: 8px;
    }

    /* === Countdown === */
    .start-signin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 14px 24px;
      border-radius: 10px;
      background: var(--success);
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      flex: 1 1 0;
      min-width: 0;
      box-sizing: border-box;
      box-shadow: 0 4px 14px rgba(93,184,114,.35);
    }
    .start-signin-btn:hover { background: #4a9e5e; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(93,184,114,.45); }
    .start-signin-btn:disabled { opacity: .8; cursor: default; transform: none; box-shadow: 0 4px 14px rgba(204,120,92,.2); }
    .start-signin-btn.countdown {
      background: #4a90d9;
      box-shadow: 0 4px 14px rgba(74,144,217,.35);
    }
    .start-signin-btn.countdown:hover { background: #3a7bc8; }
    .start-signin-btn .urgent { color: #ffcdd2; }

    /* === Sessions === */
    .session-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--hairline);
      transition: background .12s;
    }
    .session-item:last-child { border-bottom: none; }
    .session-item:hover { background: var(--canvas); }
    .session-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .session-label { font-size: 13px; font-weight: 500; color: var(--body); }
    .session-count { font-size: 11px; color: var(--muted-soft); margin-top: 2px; }
    .session-actions {
      display: flex;
      gap: 4px;
    }
    .session-action {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      background: none;
      transition: background .12s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .session-pager-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--hairline);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
    }
    .session-pager-btn:hover:not(:disabled) { background: var(--surface-card); color: var(--ink); }
    .session-pager-btn:disabled { opacity: .4; cursor: default; }

    /* === Input === */
    .input-field {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--hairline);
      font-size: 13px;
      color: var(--ink);
      background: var(--canvas);
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .input-field::placeholder { color: var(--muted-soft); }
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(204,120,92,.12);
    }

    /* === Buttons === */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      cursor: pointer;
      border: none;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-active); }
    .btn-secondary {
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
    }
    .btn-secondary:hover { background: var(--surface-card); }

    /* === Toast === */
    .toast {
      position: fixed;
      top: 80px;
      right: 24px;
      z-index: 50;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(20,20,19,.12);
      transform: translateX(120%);
      transition: transform .25s ease;
    }
    .toast.show { transform: translateX(0); }
    .toast.ok { background: #f0fdf4; color: #047857; border: 1px solid #b7e4c7; }
    .toast.err { background: #fef2f2; color: #c64545; border: 1px solid #f5c6cb; }

    /* === Floating Modal === */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(20,20,19,.55);
    }
    .modal-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(20,20,19,.15);
      width: 90vw;
      max-width: 700px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      margin: 0 16px;
      border: 1px solid var(--hairline);
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      transition: all .12s;
      flex-shrink: 0;
      z-index: 1;
    }
    .modal-close:hover { background: var(--surface-card); color: var(--ink); }

    /* === Confirm Dialog === */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 10001;
      background: rgba(20,20,19,.35);
      display: flex; align-items: center; justify-content: center;
    }
    .confirm-card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 16px 48px rgba(20,20,19,.25);
      border: 1px solid var(--hairline);
      width: min(90vw, 420px); padding: 32px 28px 24px;
      text-align: center;
    }
    .confirm-icon-wrap {
      width: 48px; height: 48px; margin: 0 auto 16px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .confirm-icon-wrap.warn { background: #fff7ed; color: #c2410c; }
    .confirm-icon-wrap.danger { background: #fef2f2; color: #c64545; }
    .confirm-title { font-size: 16px; font-weight: 600; color: var(--ink); margin: 0 0 8px; }
    .confirm-message { font-size: 13px; color: var(--body); margin: 0 0 24px; line-height: 1.6; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-btn {
      flex: 1; padding: 10px 16px; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--hairline); background: #fff; color: var(--body);
      transition: all .12s;
    }
    .confirm-btn:hover { background: var(--canvas); }
    .confirm-btn.primary {
      background: var(--error); color: #fff; border-color: var(--error);
    }
    .confirm-btn.primary:hover { background: #b53d3d; }
    .confirm-btn.danger {
      background: var(--error); color: #fff; border-color: var(--error);
    }
    .confirm-btn.danger:hover { background: #b53d3d; }

    .modal-card-overlay {
      position: relative;
      z-index: 2;
    }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 3px; }

    /* === Responsive === */
    @media (max-width: 900px) {
      .page-layout { grid-template-columns: 1fr; }
      .compact-banner { flex-direction: column; gap: 12px; align-items: flex-start; }

    }
    @media (max-width: 640px) {

    }
  </style>

  <!-- Modal backdrop + container -->

          <p id="modalTitleText" style="font-size:14px;font-weight:600;color:var(--ink);margin:0;"></p>

          <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>

<script>
const CLASS_ID = {{ cls.id }}

// === Single modal system ===
let modalCloseHandler = null

function openModal(title, content, onClose) {
  closeCurrentModal()
  document.getElementById('modalTitleText').textContent = title
  document.getElementById('modalCountText').textContent = ''
  document.getElementById('modalCountText').style.display = 'none'
  document.getElementById('modalContainer').style.minHeight = ''
  document.getElementById('modalBody').style.minHeight = ''
  document.getElementById('modalBody').innerHTML = content
  document.getElementById('modalBackdrop').style.display = 'flex'
  document.body.style.overflow = 'hidden'
  modalCloseHandler = onClose
}

function closeCurrentModal() {
  document.getElementById('modalBackdrop').style.display = 'none'
  document.getElementById('modalContainer').style.minHeight = ''
  document.getElementById('modalBody').style.minHeight = ''
  document.body.style.overflow = ''
  sessionsPage = 1
  modalCloseHandler = null
}

document.getElementById('modalCloseBtn').addEventListener('click', closeCurrentModal)
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeCurrentModal()
})
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeCurrentModal()
})

// === Tag Management ===
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

const TAG_COLORS = ['#cc785c','#5db872','#d4a017','#7c6cf0','#4a90d9','#e67e22']
let PRESET_TAGS = [] // loaded from API

async function loadPresetTags() {
  try {
    const res = await fetch('/api/preset-tags')
    const data = await res.json()
    PRESET_TAGS = (data.tags || []).map(t => ({ id: t.id, tag: t.tag, color: t.color }))
  } catch(e) {}
}

function presetTagNames() { return PRESET_TAGS.map(t => t.tag) }
function getPresetTagInfo(tagName) { return PRESET_TAGS.find(t => t.tag === tagName) }

let tagPopupTarget = { studentId: null, studentName: '' }

// Tag popup — unified design
const tagPopup = document.createElement('div')
tagPopup.id = 'tagPopup'
tagPopup.style.cssText = 'display:none;position:fixed;inset:0;z-index:10001;background:rgba(20,20,19,.35);align-items:center;justify-content:center;'
tagPopup.innerHTML = `<div id="tagPopupBox" style="position:relative;background:#fff;border-radius:12px;box-shadow:0 12px 32px rgba(20,20,19,.15);border:1px solid var(--hairline);width:280px;overflow:hidden;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;border-bottom:1px solid var(--hairline);">
    <span id="tagPopupTitle" style="font-size:13px;font-weight:600;color:var(--ink);"></span>
    <button id="tagPopupClose" style="background:none;border:none;font-size:16px;color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:4px;" onmouseover="this.style.background='var(--canvas)'" onmouseout="this.style.background=''">&times;</button>
  </div>
  <div style="padding:14px 16px;">
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">预设标签</div>
      <div id="tagPopupPresets" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div>
      <div style="font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">自定义标签</div>
      <div id="tagPopupCustomTags" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;min-height:0;"></div>
      <div style="display:flex;gap:6px;">
        <input id="tagPopupInput" type="text" value="请假" placeholder="输入标签名称" style="flex:1;padding:7px 10px;border:1px solid var(--hairline);border-radius:6px;font-size:12px;outline:none;transition:border-color .15s;" />
        <button id="tagPopupAddBtn" style="padding:7px 14px;border:none;border-radius:6px;background:var(--primary);color:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;">添加</button>
      </div>
    </div>
  </div>
</div>`
document.body.appendChild(tagPopup)

function closeTagPopup() {
  tagPopup.style.display = 'none'
  tagPopupTarget = { studentId: null, studentName: '' }
}
tagPopup.addEventListener('click', (e) => { if (e.target === tagPopup) closeTagPopup() })
document.getElementById('tagPopupClose').addEventListener('click', closeTagPopup)

function openTagPopup(studentId, studentName, btnEl) {
  if (!btnEl) return
  tagPopupTarget = { studentId, studentName }

  const currentTags = (window._studentTags || {})[studentId] || []
  const currentNames = new Set(currentTags.map(t => t.tag))

  document.getElementById('tagPopupTitle').textContent = `${studentName} - 设置标签`

  // Preset buttons
  document.getElementById('tagPopupPresets').innerHTML = PRESET_TAGS.map(pt => {
    const active = currentNames.has(pt.tag)
    return `<button class="tag-preset-btn" data-tag="${escHtml(pt.tag)}" data-active="${active}" style="padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid ${active ? pt.color : 'var(--hairline)'};background:${active ? pt.color : '#fff'};color:${active ? '#fff' : 'var(--body)'};">${escHtml(pt.tag)}</button>`
  }).join('')

  // Custom tags with × removal
  const customTags = currentTags.filter(t => !presetTagNames().includes(t.tag))
  document.getElementById('tagPopupCustomTags').innerHTML = customTags.map(t =>
    `<span class="tag-custom-item" data-tag-id="${t.id}" style="display:inline-flex;align-items:center;gap:3px;padding:3px 6px 3px 8px;border-radius:6px;font-size:12px;font-weight:500;background:${t.color};color:#fff;cursor:default;">${escHtml(t.tag)}<button type="button" class="tag-custom-remove-btn" data-tag-id="${t.id}" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;">&times;</button></span>`
  ).join('')

  tagPopup.style.display = 'flex'
  resetTagInput()
}

function resetTagInput() {
  const input = document.getElementById('tagPopupInput')
  input.value = '请假'
  input.style.color = 'var(--muted-soft)'
  input.dataset.defaultVal = '1'
}

// When user focuses/starts typing, clear default placeholder and normalize color
document.getElementById('tagPopupInput').addEventListener('focus', function() {
  if (this.dataset.defaultVal === '1') { this.value = ''; this.style.color = 'var(--ink)'; }
})
document.getElementById('tagPopupInput').addEventListener('blur', function() {
  if (!this.value.trim()) resetTagInput()
})

function findTagTargetEl(studentId) {
  return document.querySelector(`.roster-tag-btn[data-student-id="${studentId}"]`)
    || document.querySelector(`.roster-tags[data-student-id="${studentId}"]`)
}

// Preset tag toggle
document.getElementById('tagPopupPresets').addEventListener('click', async (e) => {
  const btn = e.target.closest('.tag-preset-btn')
  if (!btn) return
  const tagName = btn.dataset.tag
  const { studentId } = tagPopupTarget
  if (!studentId) return

  const currentTags = (window._studentTags || {})[studentId] || []
  const existing = currentTags.find(t => t.tag === tagName)
  if (existing) {
    await fetch(`/api/tags/${existing.id}?classId=${CLASS_ID}`, { method: 'DELETE' })
    showToast(`已移除「${tagName}」`)
  } else {
    for (const t of currentTags) {
      await fetch(`/api/tags/${t.id}?classId=${CLASS_ID}`, { method: 'DELETE' })
    }
    const pt = getPresetTagInfo(tagName)
    await fetch('/api/tags', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classId: CLASS_ID, studentId, tag: tagName, color: pt ? pt.color : TAG_COLORS[0] }),
    })
    showToast(`标签「${tagName}」已添加`)
  }
  await refreshStatus()
  openTagPopup(studentId, tagPopupTarget.studentName, findTagTargetEl(studentId))
})

// Remove custom tag (× button)
document.getElementById('tagPopupCustomTags').addEventListener('click', async (e) => {
  const removeBtn = e.target.closest('.tag-custom-remove-btn')
  if (!removeBtn || !tagPopupTarget.studentId) return
  const tagId = parseInt(removeBtn.dataset.tagId)
  await fetch(`/api/tags/${tagId}?classId=${CLASS_ID}`, { method: 'DELETE' })
  showToast('标签已删除')
  await refreshStatus()
  openTagPopup(tagPopupTarget.studentId, tagPopupTarget.studentName, findTagTargetEl(tagPopupTarget.studentId))
})

// Add custom tag — auto-close after adding
document.getElementById('tagPopupAddBtn').addEventListener('click', async () => {
  const input = document.getElementById('tagPopupInput')
  const tag = input.value.trim()
  if (!tag || !tagPopupTarget.studentId) return
  const currentTags = (window._studentTags || {})[tagPopupTarget.studentId] || []
  for (const t of currentTags) {
    await fetch(`/api/tags/${t.id}?classId=${CLASS_ID}`, { method: 'DELETE' })
  }
  const res = await fetch('/api/tags', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, studentId: tagPopupTarget.studentId, tag, color: TAG_COLORS[0] }),
  })
  const data = await res.json()
  if (!data.ok) { showToast(data.message || '添加失败', false); return }
  showToast(`标签「${tag}」已添加`)
  await refreshStatus()
  closeTagPopup()
})

document.getElementById('tagPopupInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('tagPopupAddBtn').click()
  if (e.key === 'Escape') closeTagPopup()
})

// Delete tag by clicking on it
document.getElementById('rosterCompactGrid').addEventListener('click', async (e) => {
  const tagBtn = e.target.closest('.roster-tag-btn')
  if (tagBtn) {
    openTagPopup(parseInt(tagBtn.dataset.studentId), tagBtn.dataset.studentName, tagBtn)
    return
  }

  const tagsContainer = e.target.closest('.roster-tags[data-student-id]')
  if (tagsContainer) {
    const studentId = parseInt(tagsContainer.dataset.studentId)
    const rosterItem = tagsContainer.closest('.roster-item')
    const studentName = rosterItem?.querySelector('.roster-student-name')?.textContent || ''
    openTagPopup(studentId, studentName, tagsContainer)
    return
  }

  const tagEl = e.target.closest('.roster-tag[data-tag-id]')
  if (tagEl) {
    const tagId = parseInt(tagEl.dataset.tagId)
    if (!confirm('删除此标签？')) return
    const res = await fetch(`/api/tags/${tagId}?classId=${CLASS_ID}`, { method: 'DELETE' })
    const data = await res.json()
    if (!data.ok) { showToast(data.message || '删除失败', false); return }
    showToast('标签已删除')
    await refreshStatus()
  }
})

function showToast(text, ok = true) {
  const t = document.getElementById('toast')
  t.textContent = text
  t.className = `toast ${ok ? 'ok' : 'err'} show`
  setTimeout(() => t.classList.remove('show'), 2500)
}

async function parseResponse(res) {
  if (res.status === 401) { window.location.href = '/student'; return null }
  if (!res.ok) { const t = await res.text(); console.error('API error', res.status, t); return null }
  return res.json()
}

function formatHomeClass(homeClass) {
  const value = String(homeClass || '').trim()
  if (!value) return ''
  return value.includes('班') ? value : `${value}班`
}

function formatRosterDate(value) {
  const date = value ? new Date(value) : new Date()
  if (Number.isNaN(date.getTime())) return ''
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']
  const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
  const w = weekdays[date.getDay()]
  const m = months[date.getMonth()]
  const d = date.getDate()
  const y = date.getFullYear()
  const hh = String(date.getHours()).padStart(2, '0')
  const mm = String(date.getMinutes()).padStart(2, '0')
  return `${w} ${m}${d}日 ${y}年 ${hh}:${mm}`
}

function formatSignedTime(value) {
  if (!value) return '-'
  const date = new Date(value)
  if (Number.isNaN(date.getTime())) {
    const match = String(value).match(/(\d{2}:\d{2}:\d{2})/)
    return match ? match[1] : String(value)
  }
  return date.toLocaleTimeString('zh-CN', { hour12: false })
}

function renderRosterCompact(roster, ipCount) {
  const grid = document.getElementById('rosterCompactGrid')
  grid.innerHTML = ''

  if (!roster || !roster.length) {
    grid.innerHTML = '<div class="roster-empty">暂无学生</div>'
    return
  }

  roster.forEach(r => {
    const isSigned = r.status === '已签到'
    const dupIp = ipCount[(r.computerName || '').trim()] > 1
    const itemClass = dupIp ? 'dup' : isSigned ? 'signed' : ''
    const dotClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusText = dupIp ? '重复IP' : isSigned ? '已签到' : '未签到'
    const metaClass = dupIp ? 'dup' : ''

    const revokeBtn = (isSigned && r.recordId)
      ? `<button onclick="revokeRecord(${r.recordId})" class="roster-revoke">撤销</button>`
      : ''

    const tagsHtml = (r.tags || []).map(t =>
      `<span class="roster-tag" style="background:${t.color}" data-tag-id="${t.id}">${escHtml(t.tag)}</span>`
    ).join('')

    const item = document.createElement('div')
    item.className = `roster-item ${itemClass}`
    const hasTag = tagsHtml ? true : false
    item.innerHTML = `
      <div class="roster-line">
        <div class="roster-name-wrap">
          <span class="roster-dot ${dotClass}"></span>
          <span class="roster-student-name">${escHtml(r.studentName)}</span>
          <span class="roster-home-class">${formatHomeClass(r.homeClass)}</span>
        </div>
        ${tagsHtml ? `<span class="roster-tags" data-student-id="${r.studentId}">${tagsHtml}</span>` : ''}
        ${!hasTag ? `<button class="roster-tag-btn" data-student-id="${r.studentId}" data-student-name="${escHtml(r.studentName)}" title="添加标签">+</button>` : ''}
        <span class="roster-status ${statusClass}">${statusText}</span>
      </div>
      <div class="roster-meta">
        <span class="roster-meta-text ${metaClass}"><span class="ip">${r.computerName || '-'}</span><span class="sep">/</span><span class="time">${isSigned ? formatSignedTime(r.signedAt) : '-'}</span></span>
        ${revokeBtn}
      </div>`
    grid.appendChild(item)
  })
}

async function refreshStatus() {
  const res = await fetch(`/api/status?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  if (!Array.isArray(data.roster)) return

  const total = data.totalCount, signed = data.signedCount
  document.getElementById('totalCount').textContent = total
  document.getElementById('signedCount').textContent = signed
  document.getElementById('absentCount').textContent = data.absentCount
  document.getElementById('rosterBadge').textContent = `共 ${total} 人`
  const firstSignedAt = data.roster.find(r => r.signedAt)?.signedAt
  document.getElementById('rosterDate').textContent = formatRosterDate(firstSignedAt)

  if (data.countdown) {
    startCountdownTimer(data.countdown.startedAt, data.countdown.durationMin)
  } else {
    stopCountdownTimer()
  }

  const ipCount = {}
  data.roster.forEach(r => { const ip = (r.computerName||'').trim(); if (ip && ip!=='-') ipCount[ip]=(ipCount[ip]||0)+1 })
  renderRosterCompact(data.roster, ipCount)

  // Load tags
  try {
    const tagRes = await fetch('/api/tags?classId=' + CLASS_ID)
    window._studentTags = await tagRes.json()
  } catch(e) {}
}

let sessionsPage = 1
const SESSIONS_PAGE_SIZE = 10

async function refreshSessions(page = 1) {
  sessionsPage = page
  const res = await fetch(`/api/sessions?classId=${CLASS_ID}&page=${page}&pageSize=${SESSIONS_PAGE_SIZE}`)
  const data = await parseResponse(res)
  if (!data) return
  const { sessions, total, totalPages } = data
  document.getElementById('modalCountText').textContent = sessions.length ? `共 ${total} 批次，第 ${page}/${totalPages} 页` : ''
  document.getElementById('modalCountText').style.display = ''
  if (!sessions.length) {
    document.getElementById('modalBody').innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:var(--muted-soft);">暂无历史批次</div>'
    return
  }
  const listHtml = sessions.map(s => `
    <div class="session-item">
      <div class="session-head">
        <div>
          <p class="session-label">${s.label}</p>
          <p class="session-count">签到人数：${s.count}</p>
        </div>
        <div class="session-actions">
          <a href="/teacher/sessions/${s.id}/seats"
            class="session-action" style="color:var(--primary);" onmouseover="this.style.background='#fef3ec'" onmouseout="this.style.background=''">座位表</a>
          <a href="/api/sessions/${s.id}/export"
            class="session-action" style="color:var(--success);" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background=''">导出</a>
          <button onclick="deleteSessionItem(${s.id}, this.dataset.label)" data-label="${s.label.replace(/"/g,'&quot;')}"
            class="session-action" style="color:var(--error);" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background=''">删除</button>
        </div>
      </div>
    </div>`).join('')
  const pagerHtml = totalPages > 1 ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-top:1px solid var(--hairline);flex-shrink:0;">
      <button class="session-pager-btn" ${page <= 1 ? 'disabled' : `onclick="refreshSessions(${page - 1})"`}>&laquo; 上一页</button>
      <span style="font-size:12px;color:var(--muted);">第 ${page} / ${totalPages} 页</span>
      <button class="session-pager-btn" ${page >= totalPages ? 'disabled' : `onclick="refreshSessions(${page + 1})"`}>下一页 &raquo;</button>
    </div>` : ''
  const body = document.getElementById('modalBody')
  body.style.minHeight = SESSIONS_PAGE_SIZE * 60 + 'px'
  body.innerHTML = listHtml + pagerHtml
  const container = document.getElementById('modalContainer')
  container.style.height = (SESSIONS_PAGE_SIZE * 60 + 120) + 'px'
}

async function deleteSessionItem(sessionId, label) {
  if (!confirm(`确认删除历史批次「${label}」？此操作不可恢复。`)) return
  const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' })
  const data = await parseResponse(res)
  if (!data) return
  showToast(data.message || '历史批次已删除', true)
  const backdrop = document.getElementById('modalBackdrop')
  if (backdrop.style.display === 'flex') {
    const title = document.getElementById('modalTitleText').textContent
    if (title === '历史批次') { sessionsPage = 1; await refreshSessions(1) }
    else if (title === '出勤统计') await loadStats()
  }
}

async function revokeRecord(recordId) {
  if (!confirm('确认撤销该签到记录？')) return
  const res = await fetch('/api/signin/' + recordId, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { showToast(data.message, false); return }
  showToast('已撤销')
  refreshStatus()
}

// === Confirmation Dialog ===
function showConfirmDialog(title, message, confirmText = '确认', style = 'danger') {
  return new Promise((resolve) => {
    const overlay = document.createElement('div')
    overlay.className = 'confirm-overlay'
    const iconStyle = style === 'danger' ? 'danger' : 'warn'
    overlay.innerHTML = `
      <div class="confirm-card">
        <div class="confirm-icon-wrap ${iconStyle}">
          <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
          </svg>
        </div>
        <p class="confirm-title">${title}</p>
        <p class="confirm-message">${message}</p>
        <div class="confirm-actions">
          <button class="confirm-btn" id="confirmCancelBtn">取消</button>
          <button class="confirm-btn ${style}" id="confirmOkBtn">${confirmText}</button>
        </div>
      </div>
    `
    document.body.appendChild(overlay)
    document.body.style.overflow = 'hidden'

    const cleanup = () => {
      overlay.remove()
      document.body.style.overflow = ''
    }

    document.getElementById('confirmCancelBtn').onclick = () => { cleanup(); resolve(false) }
    document.getElementById('confirmOkBtn').onclick = () => { cleanup(); resolve(true) }
    overlay.addEventListener('click', (e) => { if (e.target === overlay) { cleanup(); resolve(false) } })
  })
}

document.getElementById('resetBtn').addEventListener('click', async () => {
  const confirmed = await showConfirmDialog(
    '归档并重置',
    '将当前签到记录归档为历史批次，然后清空名单。是否继续？',
    '确认归档',
    'danger'
  )
  if (!confirmed) return
  const res = await fetch('/api/reset', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })

  const data = await parseResponse(res)

document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const fd = new FormData()
  fd.append('file', file)
  fd.append('classId', CLASS_ID)
  showToast('导入中...', true)
  const res = await fetch('/api/import', { method: 'POST', body: fd })

  if (!data) return
  showToast(data.message, data.ok)
  if (data.ok) refreshStatus()

// === Countdown Timer ===
let _countdownInterval = null

function startCountdownTimer(startedAtISO, durationMin) {
  stopCountdownTimer()
  const startedAt = new Date(startedAtISO).getTime()
  const endTime = startedAt + durationMin * 60 * 1000
  const text = document.getElementById('startSigninText')
  const btn = document.getElementById('startSigninBtn')
  btn.classList.add('countdown')

  function tick() {
    const now = Date.now()
    const remaining = Math.max(0, endTime - now)

    const mins = Math.floor(remaining / 60000)
    const secs = Math.floor((remaining % 60000) / 1000)
    text.textContent = `倒计时 ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`

    const urgent = remaining <= 5 * 60 * 1000
    text.classList.toggle('urgent', urgent)

    if (remaining <= 0) {
      stopCountdownTimer()
      refreshStatus()
    }
  }

  tick()
  _countdownInterval = setInterval(tick, 1000)
}

function stopCountdownTimer() {
  if (_countdownInterval) { clearInterval(_countdownInterval); _countdownInterval = null }
  const text = document.getElementById('startSigninText')
  const btn = document.getElementById('startSigninBtn')
  if (text) { text.textContent = '开始签到'; text.classList.remove('urgent') }
  if (btn) btn.classList.remove('countdown')
}

document.getElementById('startSigninBtn').addEventListener('click', async () => {
  if (_countdownInterval) return
  const res = await fetch('/api/signin/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  if (!data.ok) { showToast(data.message, false); return }
  showToast('签到已开始，倒计时40分钟')
  refreshStatus()
})

// === SSE 实时推送（替代轮询）===
const SSE_URL = '{{ sseUrl }}'
let eventSource = null
let _refreshTimer = null

function connectSSE() {
  if (!SSE_URL) { startAutoRefresh(); return }
  eventSource = new EventSource(SSE_URL)

  eventSource.addEventListener('connected', () => {
    // 连接成功，停止轮询
    if (_refreshTimer) { clearTimeout(_refreshTimer); _refreshTimer = null }
  })

  eventSource.addEventListener('signin', () => {
    // Don't refresh if tag popup is open
    if (tagPopup.style.display !== 'none') return
    refreshStatus()
  })

  eventSource.addEventListener('countdown-started', () => {
    refreshStatus()
  })

  eventSource.addEventListener('countdown-expired', () => {
    refreshStatus()
  })

  eventSource.addEventListener('countdown-stopped', () => {
    refreshStatus()
  })

  eventSource.addEventListener('preset-tags-changed', () => {
    loadPresetTags().then(refreshStatus)
  })

  eventSource.onerror = () => {
    // SSE 断开，降级为轮询
    eventSource = null
    if (!_refreshTimer) startAutoRefresh()
  }
}

function startAutoRefresh() {
  clearTimeout(_refreshTimer)
  _refreshTimer = setTimeout(() => {
    if (tagPopup.style.display !== 'none') {
      startAutoRefresh()
      return
    }
    refreshStatus()
    startAutoRefresh()
  }, 4000)
}

connectSSE()
