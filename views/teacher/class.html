<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 签到管理</title>
  <link rel="stylesheet" href="/public/design-system.css">
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    /* 保留页面特有样式 */
    .progress-bar { transition: width 0.3s ease; }
    .roster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .roster-list-item {
      border: 1px solid var(--slate-200); border-radius: var(--card-radius-sm); padding: 12px;
      background: var(--card-bg-solid);
      transition: all var(--duration-fast) var(--ease-out);
      box-shadow: var(--shadow-xs);
    }
    .roster-list-item:hover { background: #fff; box-shadow: var(--shadow-sm); }
    .roster-list-item.signed { border-color: rgba(87, 167, 120, 0.3); background: var(--success-light); }
    .roster-list-item.unsigned { border-color: var(--slate-200); background: rgba(255, 255, 255, 0.8); }
    .roster-list-item.dup { border-color: rgba(217, 110, 110, 0.3); background: var(--error-light); }
    .roster-dot { width: 8px; height: 8px; border-radius: 9999px; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.8); }
    .roster-dot.signed { background: var(--success-500); }
    .roster-dot.unsigned { background: var(--slate-300); }
    .roster-dot.dup { background: var(--error-500); }
    .roster-line { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .roster-name { min-width: 0; display: flex; align-items: center; gap: 8px; }
    .roster-student { min-width: 0; display: flex; align-items: baseline; gap: 6px; }
    .roster-student strong { display: block; font-size: 14px; line-height: 1.2; font-weight: 600; color: var(--slate-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .roster-student span { display: block; font-size: 11px; line-height: 1; color: var(--slate-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
    .roster-status {
      flex-shrink: 0; display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 9999px;
      font-size: 11px; line-height: 1; font-weight: 600; border: 1px solid transparent;
    }
    .roster-status.signed { color: var(--success-700); background: var(--success-100); border-color: rgba(16, 185, 129, 0.2); }
    .roster-status.unsigned { color:#64748b;background:rgba(241,245,249,.92);border-color:rgba(203,213,225,.5); }
    .roster-status.dup { color: var(--error-600); background: var(--error-50); border-color: rgba(248, 113, 113, 0.24); }
    .roster-meta { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .roster-meta-text {
      min-width: 0; display: inline-flex; align-items: center; padding: 5px 8px; border-radius: 10px;
      font-size: 11px; line-height: 1.1; color: var(--slate-500);
      background: var(--slate-50); border: 1px solid var(--slate-200);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .roster-meta-text.signed { color: var(--slate-700); background: rgba(255, 255, 255, 0.72); }
    .roster-meta-text.dup { color: var(--error-700); background: var(--error-50); border-color: rgba(248, 113, 113, 0.24); }
    .roster-action {
      flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
      min-width: 42px; height: 28px; padding: 0 8px; border-radius: 9px;
      font-size: 11px; line-height: 1; font-weight: 500;
    }
    .roster-action.revoke { color: var(--error-600); background: rgba(255, 255, 255, 0.86); border: 1px solid rgba(248, 113, 113, 0.24); }
    .roster-action.empty { opacity: 0; pointer-events: none; border: 1px solid transparent; }
    .subtle-panel { background: linear-gradient(180deg, rgba(248, 250, 252, 0.62), rgba(255, 255, 255, 0.54)); }
    .metric-card { position: relative; overflow: hidden; }
    .metric-card::before {
      content: ''; position: absolute; inset: auto auto 0 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--success-600), rgba(31, 122, 91, 0.14));
    }
    .metric-card.soft::before { background: linear-gradient(90deg, var(--slate-400), rgba(148, 163, 184, 0.08)); }
    .window-fields { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; padding-top: 14px; }
    .window-field label { display: block; font-size: 11px; color: var(--slate-400); margin-bottom: 5px; }
    .window-help { margin-top: 10px; font-size: 11px; color: var(--slate-400); }
    .topbar-shell { min-height: 70px; padding: 12px 0; }
    .nav-divider { color: var(--slate-300); }
    .text-emerald-600 { color: var(--success-600); }
    .text-slate-300 { color: var(--slate-300); }
  </style>
</head>
<body class="min-h-screen">

  <!-- 顶栏 -->
  <header class="header-blur border-b border-white/60 sticky top-0 z-20">
    <div class="max-w-5xl mx-auto px-4 topbar-shell flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <a href="/teacher/classes" class="nav-link">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          班级列表
        </a>
        <span class="nav-divider">|</span>
        <span class="nav-title">{{ cls.name }}</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="pwdToggle" class="nav-action">修改密码</button>
        <form method="post" action="/teacher/logout">
          <button class="nav-action" type="submit">退出</button>
        </form>
      </div>
    </div>
  </header>

  <!-- 修改密码面板 -->
  <div id="pwdPanel" class="hidden header-blur border-b border-white/60">
    <div class="max-w-5xl mx-auto px-4 py-4 fade">
      <p class="text-sm font-medium text-slate-700 mb-3">修改密码</p>
      <div class="flex flex-wrap gap-2 items-end">
        <div>
          <label class="block text-xs text-slate-400 mb-1">旧密码</label>
          <input id="oldPwd" type="password" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800 w-36" />
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">新密码</label>
          <input id="newPwd" type="password" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800 w-36" />
        </div>
        <button id="changePwdBtn" class="btn btn-primary">确认修改</button>
      </div>
      <div id="pwdMsg" class="hidden mt-2 text-sm"></div>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="card stat-card p-4">
        <p class="stat-label">总人数</p>
        <p id="totalCount" class="stat-value">0</p>
      </div>
      <div class="card stat-card p-4">
        <p class="stat-label">已签到</p>
        <p id="signedCount" class="stat-value text-emerald-600">0</p>
        <div class="mt-2 h-1.5 bg-slate-100 rounded-full overflow-hidden">
          <div id="progressBar" class="progress-bar h-full bg-emerald-400 rounded-full" style="width:0%"></div>
        </div>
      </div>
      <div class="card stat-card p-4">
        <p class="stat-label">未签到</p>
        <p id="absentCount" class="stat-value text-slate-300">0</p>
      </div>
    </div>

    <!-- 学生签到入口 -->
    <a href="/student?classId={{ cls.id }}" target="_blank" class="student-entry-card">
      <div>
        <p class="student-entry-card-title">学生签到入口</p>
        <p class="student-entry-card-desc">/student?classId={{ cls.id }}</p>
      </div>
      <svg class="student-entry-card-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </svg>
    </a>

    <!-- 课堂工具 -->
    <div class="card p-5">
      <div class="section-header">
        <p class="section-label">课堂工具</p>
      </div>
      <div class="action-group">
        <a href="/teacher/classes/{{ cls.id }}/seats" class="btn btn-primary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
          </svg>
          座位表
        </a>
        <a href="/teacher/classes/{{ cls.id }}/students" class="btn btn-secondary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          学生管理
        </a>
        <a href="/teacher/info?classId={{ cls.id }}" class="btn btn-secondary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          信息收集
        </a>
        <button id="statsToggle" class="btn btn-secondary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          出勤统计
        </button>
      </div>
    </div>

    <!-- 数据管理 (可折叠) -->
    <div class="collapse-card">
      <button id="data_mgmt_toggle" class="collapse-trigger" aria-expanded="false">
        <span>数据管理</span>
        <svg class="collapse-trigger-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="data_mgmt_body" class="collapse-body hidden">
        <div class="action-group">
          <button id="importBtn" class="btn btn-secondary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            导入名单
          </button>
          <a href="/api/export?classId={{ cls.id }}" class="btn btn-secondary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            导出签到记录
          </a>
          <a href="/api/stats/export?classId={{ cls.id }}" class="btn btn-secondary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            导出出勤统计
          </a>
        </div>
      </div>
    </div>

    <!-- 危险操作 (可折叠) -->
    <div class="collapse-card">
      <button id="danger_toggle" class="collapse-trigger" aria-expanded="false">
        <span class="text-red-600">危险操作</span>
        <svg class="collapse-trigger-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="danger_body" class="collapse-body hidden">
        <div class="action-group">
          <button id="resetBtn" class="btn btn-danger">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            归档重置
          </button>
          <button id="clearRosterBtn" class="btn btn-danger">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            清空名单
          </button>
        </div>
        <p class="mt-3 text-xs text-slate-400">归档重置：将当前签到存为历史批次并清空状态。清空名单：删除全部学生及记录，不可恢复。</p>
      </div>
    </div>

    <!-- 签到时间段（可折叠） -->
    <div class="collapse-card">
      <button id="windowToggle" class="collapse-trigger" aria-expanded="false">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg bg-brand-50 border border-brand-200 flex items-center justify-center">
            <svg class="w-[18px] h-[18px] text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <div>
            <strong class="text-sm">签到时间段</strong>
            <p class="text-xs text-slate-500 mt-0.5">设置开始和结束时间后，学生只可在允许的时间范围内完成签到。</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs text-slate-500" id="windowText">不限</span>
          <svg class="collapse-trigger-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </button>
      <div id="windowPanel" class="collapse-body hidden">
        <div class="window-fields">
          <div class="window-field">
            <label>开始时间</label>
            <input id="startTime" type="datetime-local" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800" />
          </div>
          <div class="window-field">
            <label>结束时间</label>
            <input id="endTime" type="datetime-local" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-slate-800" />
          </div>
          <button id="saveWindow" class="btn btn-primary">保存</button>
          <button id="clearWindow" class="btn btn-secondary">清除限制</button>
        </div>
        <p class="window-help">留空表示不限制，设置后会立即对学生签到入口生效。</p>
      </div>
    </div>

    <!-- 出勤统计面板 -->
    <div id="statsPanel" class="hidden card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">出勤统计</p>
      </div>
      <div id="statsContent" class="px-5 py-8 text-center text-sm text-slate-400">加载中...</div>
    </div>

    <!-- 通知 -->
    <div id="msg" class="hidden px-4 py-3 rounded-xl text-sm font-medium fade"></div>

    <!-- 签到名单 -->
    <div class="card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <p class="text-sm font-medium text-slate-700">当前签到名单</p>
          <span id="rosterBadge" class="text-xs text-slate-400"></span>
          <span id="rosterDate" class="text-xs text-slate-300"></span>
        </div>
      </div>
      <div class="p-5 subtle-panel">
        <div id="rosterCompactGrid" class="roster-grid"></div>
      </div>
    </div>

    <!-- 历史批次 -->
    <div class="card overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-50 flex items-center justify-between">
        <p class="text-sm font-medium text-slate-700">历史批次</p>
        <span id="sessionCount" class="text-xs text-slate-400"></span>
      </div>
      <div id="sessionList">
        <div class="px-5 py-8 text-center text-sm text-slate-400">暂无历史批次</div>
      </div>
    </div>

    <!-- 导入名单隐藏 input -->
    <input type="file" id="importFile" accept=".xlsx,.xls" class="hidden" />

    <!-- 历史批次详情弹窗 -->
    <div id="sessionModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/30">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl mx-4 max-h-[80vh] flex flex-col">
        <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
          <p id="modalTitle" class="text-sm font-semibold text-slate-800"></p>
          <button id="modalClose" class="text-slate-400 hover:text-slate-600 transition text-xl leading-none">&times;</button>
        </div>
        <div class="overflow-auto flex-1">
          <table class="w-full text-sm">
            <thead class="sticky top-0 bg-white">
              <tr class="text-xs text-slate-400 border-b border-slate-100">
                <th class="text-left px-5 py-3 font-medium">姓名</th>
                <th class="text-left px-5 py-3 font-medium">行政班级</th>
                <th class="text-left px-5 py-3 font-medium">签到状态</th>
                <th class="text-left px-5 py-3 font-medium">计算机 IP</th>
                <th class="text-left px-5 py-3 font-medium">签到时间</th>
              </tr>
            </thead>
            <tbody id="modalBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

<script>
const CLASS_ID = {{ cls.id }}
const msg = document.getElementById('msg')

function notify(text, ok = true) {
  msg.className = `px-4 py-3 rounded-xl text-sm font-medium fade ${ok
    ? 'bg-emerald-50 text-emerald-700 border border-emerald-100'
    : 'bg-red-50 text-red-600 border border-red-100'}`
  msg.textContent = text
  msg.classList.remove('hidden')
  setTimeout(() => msg.classList.add('hidden'), 2500)
}

async function parseResponse(res) {
  if (res.status === 401) { window.location.href = '/student'; return null }
  if (!res.ok) { const t = await res.text(); console.error('API error', res.status, t); return null }
  return res.json()
}

function formatHomeClass(homeClass) {
  const value = String(homeClass || '').trim()
  if (!value) return ''
  return value.includes('班') ? value : `${value}班`
}

function formatRosterDate(value) {
  const date = value ? new Date(value) : new Date()
  if (Number.isNaN(date.getTime())) return ''
  const year = date.getFullYear()
  const month = String(date.getMonth() + 1).padStart(2, '0')
  const day = String(date.getDate()).padStart(2, '0')
  return `${year}-${month}-${day}`
}

function formatSignedTime(value) {
  if (!value) return '-'
  const date = new Date(value)
  if (Number.isNaN(date.getTime())) {
    const match = String(value).match(/(\d{2}:\d{2}:\d{2})/)
    return match ? match[1] : String(value)
  }
  return date.toLocaleTimeString('zh-CN', { hour12: false })
}

function renderRosterCompact(roster, ipCount) {
  const grid = document.getElementById('rosterCompactGrid')
  grid.innerHTML = ''

  roster.forEach(r => {
    const isSigned = r.status === '已签到'
    const dupIp = ipCount[(r.computerName || '').trim()] > 1
    const item = document.createElement('div')
    item.className = `roster-list-item ${dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'}`
    const dotClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusText = dupIp ? '重复 IP' : isSigned ? '已签到' : '未签到'
    const metaClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const metaHtml = `<span class="roster-meta-piece ip">${r.computerName || '-'}</span><span class="roster-meta-slash">/</span><span class="roster-meta-piece time">${isSigned ? formatSignedTime(r.signedAt) : '-'}</span>`

    const revokeBtn = (isSigned && r.recordId)
      ? `<button onclick="revokeRecord(${r.recordId})" class="roster-action revoke">撤销</button>`
      : '<span class="roster-action empty">占位</span>'

    item.innerHTML = `
      <div class="roster-line">
        <div class="roster-name">
          <span class="roster-dot ${dotClass}"></span>
          <div class="roster-student">
            <strong>${r.studentName}</strong>
            <span>${formatHomeClass(r.homeClass) || '&nbsp;'}</span>
          </div>
        </div>
        <span class="roster-status ${statusClass}">${statusText}</span>
      </div>
      <div class="roster-meta">
        <span class="roster-meta-text ${metaClass}">${metaHtml}</span>
        ${revokeBtn}
      </div>`
    grid.appendChild(item)
  })

  if (!roster.length) {
    grid.innerHTML = '<div class="col-span-full px-4 py-6 text-sm text-slate-400 text-center bg-white rounded-xl border border-dashed border-slate-200">暂无学生</div>'
  }
}

async function refreshStatus() {
  const res = await fetch(`/api/status?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  if (!Array.isArray(data.roster)) return

  const total = data.totalCount, signed = data.signedCount
  document.getElementById('totalCount').textContent = total
  document.getElementById('signedCount').textContent = signed
  document.getElementById('absentCount').textContent = data.absentCount
  document.getElementById('progressBar').style.width = total > 0 ? (signed / total * 100) + '%' : '0%'
  document.getElementById('rosterBadge').textContent = `共 ${total} 人`
  const firstSignedAt = data.roster.find(r => r.signedAt)?.signedAt
  document.getElementById('rosterDate').textContent = formatRosterDate(firstSignedAt)

  const wt = document.getElementById('windowText')
  wt.textContent = (data.window.start || data.window.end)
    ? `${data.window.start || '不限'} 至 ${data.window.end || '不限'}`
    : '不限'

  const ipCount = {}
  data.roster.forEach(r => { const ip = (r.computerName||'').trim(); if (ip && ip!=='-') ipCount[ip]=(ipCount[ip]||0)+1 })
  renderRosterCompact(data.roster, ipCount)
}

async function refreshSessions() {
  const res = await fetch(`/api/sessions?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  const list = document.getElementById('sessionList')
  document.getElementById('sessionCount').textContent = data.length ? `共 ${data.length} 批次` : ''
  if (!data.length) { list.innerHTML = '<div class="px-5 py-8 text-center text-sm text-slate-400">暂无历史批次</div>'; return }
  list.innerHTML = data.map(s => `
    <div class="px-5 py-3 border-b border-slate-50 last:border-0 flex items-center justify-between hover:bg-slate-50 transition">
      <div>
        <p class="text-sm text-slate-700">${s.label}</p>
        <p class="text-xs text-slate-400 mt-0.5">签到人数：${s.count}</p>
      </div>
      <div class="flex gap-2">
        <button onclick="openSession(${s.id}, this.dataset.label)" data-label="${s.label.replace(/"/g,'&quot;')}"
          class="text-xs px-3 py-1.5 rounded-lg text-slate-600 hover:bg-slate-100 transition">查看</button>
        <a href="/teacher/sessions/${s.id}/seats"
          class="text-xs px-3 py-1.5 rounded-lg text-sky-600 hover:bg-sky-50 transition">座位表</a>
        <a href="/api/sessions/${s.id}/export"
          class="text-xs px-3 py-1.5 rounded-lg text-emerald-600 hover:bg-emerald-50 transition">导出</a>
        <button onclick="deleteSessionItem(${s.id}, this.dataset.label)" data-label="${s.label.replace(/"/g,'&quot;')}"
          class="text-xs px-3 py-1.5 rounded-lg text-red-500 hover:bg-red-50 transition">删除</button>
      </div>
    </div>`).join('')
}

async function openSession(sessionId, label) {
  const res = await fetch(`/api/sessions/${sessionId}`)
  const data = await parseResponse(res)
  if (!data) return
  document.getElementById('modalTitle').textContent = label
  document.getElementById('modalBody').innerHTML = (data.roster||[]).map(r => `
    <tr class="border-b border-slate-50 last:border-0">
      <td class="px-5 py-3 text-slate-800">${r.studentName}</td>
      <td class="px-5 py-3 text-slate-400 text-xs">${formatHomeClass(r.homeClass)}</td>
      <td class="px-5 py-3 text-xs ${r.status === '已签到' ? 'text-emerald-600' : 'text-slate-400'}">${r.status === '已签到' ? '✓ 已签到' : '✗ 未签到'}</td>
      <td class="px-5 py-3 font-mono text-xs text-slate-400">${r.computerName || '-'}</td>
      <td class="px-5 py-3 text-slate-400 text-xs">${r.signedAt || '-'}</td>
    </tr>`).join('')
  document.getElementById('sessionModal').classList.remove('hidden')
}

async function deleteSessionItem(sessionId, label) {
  if (!confirm(`确认删除历史批次「${label}」？此操作不可恢复。`)) return
  const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message || '历史批次已删除', true)
  document.getElementById('sessionModal').classList.add('hidden')
  await refreshSessions()
  const statsPanel = document.getElementById('statsPanel')
  if (!statsPanel.classList.contains('hidden')) {
    await loadStats()
  }
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('sessionModal').classList.add('hidden')
})

document.getElementById('statsToggle').addEventListener('click', async () => {
  const panel = document.getElementById('statsPanel')
  panel.classList.toggle('hidden')
  if (!panel.classList.contains('hidden')) await loadStats()
})

async function loadStats() {
  const content = document.getElementById('statsContent')
  content.innerHTML = '<div class="py-8 text-center text-sm text-slate-400">加载中...</div>'
  const res = await fetch('/api/stats?classId=' + CLASS_ID)
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.students || !data.students.length) {
    content.innerHTML = '<div class="py-8 text-center text-sm text-slate-400">暂无历史批次数据</div>'; return
  }
  content.innerHTML = `<div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead><tr class="text-xs text-slate-400 border-b border-slate-50">
        <th class="text-left px-5 py-3 font-medium">姓名</th>
        <th class="text-left px-5 py-3 font-medium">行政班级</th>
        <th class="text-center px-5 py-3 font-medium">签到</th>
        <th class="text-center px-5 py-3 font-medium">缺勤</th>
        <th class="text-center px-5 py-3 font-medium">出勤率</th>
      </tr></thead>
      <tbody>${data.students.map(s => {
        const rate = parseFloat(s.rate)
        const color = rate >= 80 ? 'text-emerald-600' : rate >= 60 ? 'text-amber-500' : 'text-red-500'
        return `<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50">
          <td class="px-5 py-3 font-medium text-slate-800">${s.name}</td>
          <td class="px-5 py-3 text-xs text-slate-400">${formatHomeClass(s.homeClass)}</td>
          <td class="px-5 py-3 text-center text-slate-600">${s.signedCount}</td>
          <td class="px-5 py-3 text-center text-slate-400">${s.absentCount}</td>
          <td class="px-5 py-3 text-center font-semibold ${color}">${s.rate}%</td>
        </tr>`
      }).join('')}</tbody>
    </table>
    <p class="px-5 py-3 text-xs text-slate-400 border-t border-slate-50">共 ${data.totalSessions} 个历史批次</p>
  </div>`
}

async function revokeRecord(recordId) {
  if (!confirm('确认撤销该签到记录？')) return
  const res = await fetch('/api/signin/' + recordId, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { notify(data.message, false); return }
  notify('已撤销')
  refreshStatus()
}

document.getElementById('pwdToggle').addEventListener('click', () => {
  document.getElementById('pwdPanel').classList.toggle('hidden')
})

document.getElementById('changePwdBtn').addEventListener('click', async () => {
  const pwdMsg = document.getElementById('pwdMsg')
  const res = await fetch('/api/change-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ old_password: document.getElementById('oldPwd').value, new_password: document.getElementById('newPwd').value })
  })
  const data = await parseResponse(res)
  if (!data) return
  pwdMsg.className = `mt-2 text-sm ${data.ok ? 'text-emerald-600' : 'text-red-500'}`
  pwdMsg.textContent = data.message
  pwdMsg.classList.remove('hidden')
  if (data.ok) { document.getElementById('oldPwd').value = ''; document.getElementById('newPwd').value = '' }
})

document.getElementById('windowToggle').addEventListener('click', function() {
  const panel = document.getElementById('windowPanel')
  panel.classList.toggle('hidden')
  this.setAttribute('aria-expanded', !panel.classList.contains('hidden'))
})

// 数据管理折叠
document.getElementById('data_mgmt_toggle').addEventListener('click', function() {
  const body = document.getElementById('data_mgmt_body')
  body.classList.toggle('hidden')
  this.setAttribute('aria-expanded', !body.classList.contains('hidden'))
})

// 危险操作折叠
document.getElementById('danger_toggle').addEventListener('click', function() {
  const body = document.getElementById('danger_body')
  body.classList.toggle('hidden')
  this.setAttribute('aria-expanded', !body.classList.contains('hidden'))
})

document.getElementById('saveWindow').addEventListener('click', async () => {
  const res = await fetch('/api/window', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, start_time: document.getElementById('startTime').value||null, end_time: document.getElementById('endTime').value||null })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

document.getElementById('clearWindow').addEventListener('click', async () => {
  document.getElementById('startTime').value = ''
  document.getElementById('endTime').value = ''
  const res = await fetch('/api/window', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, start_time: null, end_time: null })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify('已清除时间限制', data.ok)
  refreshStatus()
})

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('确认归档当前签到记录并重置？')) return
  const res = await fetch('/api/reset', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
  refreshSessions()
})

document.getElementById('clearRosterBtn').addEventListener('click', async () => {
  if (!confirm('确认清空名单及全部签到记录？此操作不可恢复！')) return
  const res = await fetch('/api/clear-roster', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  notify(data.message, data.ok)
  refreshStatus()
})

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click()
})
document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const fd = new FormData()
  fd.append('file', file)
  fd.append('classId', CLASS_ID)
  notify('导入中...', true)
  const res = await fetch('/api/import', { method: 'POST', body: fd })
  const data = await parseResponse(res)
  e.target.value = ''
  if (!data) return
  notify(data.message, data.ok)
  if (data.ok) refreshStatus()
})

refreshStatus()
refreshSessions()
setInterval(refreshStatus, 4000)
</script>
</body>
</html>
