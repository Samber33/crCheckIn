<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ cls.name }} - 签到管理</title>
  <link rel="stylesheet" href="/public/tailwind.min.css">
  <style>
    :root {
      --canvas: #faf9f5;
      --surface-card: #efe9de;
      --surface-dark: #181715;
      --primary: #cc785c;
      --primary-active: #a9583e;
      --ink: #141413;
      --body: #3d3d3a;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --hairline: #e6dfd8;
      --on-primary: #ffffff;
      --on-dark: #faf9f5;
      --success: #5db872;
      --error: #c64545;
      --warning: #d4a017;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--canvas);
      color: var(--body);
      margin: 0;
    }

    /* === Header === */
    .header-bar {
      background: var(--canvas);
      border-bottom: 1px solid var(--hairline);
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all .15s ease;
      text-decoration: none;
    }
    .nav-link:hover { background: var(--surface-card); color: var(--ink); }
    .page-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-weight: 400;
      letter-spacing: -0.3px;
      color: var(--ink);
    }
    .nav-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: all .15s ease;
      border: none;
      background: none;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-action:hover { background: var(--surface-card); color: var(--ink); }

    /* === Compact Banner === */
    .compact-banner {
      background: var(--surface-dark);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .banner-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--on-dark);
      margin: 0;
      letter-spacing: -0.3px;
    }
    .banner-stats {
      display: flex;
      gap: 12px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .banner-stat {
      text-align: center;
      padding: 8px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .banner-stat-label {
      font-size: 11px;
      color: #8e8b82;
      margin: 0;
    }
    .banner-stat-value {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--on-dark);
      margin: 4px 0 0;
      line-height: 1;
    }
    .banner-stat-value.accent { color: var(--primary); }
    .banner-stat-value.muted { color: #8e8b82; }

    /* === Layout === */
    .page-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      align-items: start;
    }

    /* === Card === */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--hairline);
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--hairline);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
    }

    /* === Entry Card === */
    .entry-card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px 28px;
      background: var(--surface-dark);
      color: var(--on-dark);
      border-radius: 14px;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .entry-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(204,120,92,.2), transparent 70%);
      pointer-events: none;
    }
    .entry-card:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(204,120,92,.25); }
    .entry-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .entry-body { flex: 1; position: relative; }
    .entry-title {
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--on-dark);
      margin: 0 0 4px;
      letter-spacing: -0.3px;
    }
    .entry-url {
      font-size: 12px;
      color: #a09d96;
      margin: 0;
    }
    .entry-arrow {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--on-dark);
      position: relative;
    }

    /* === Roster === */
    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      padding: 16px;
    }
    .roster-item {
      border: 1px solid var(--hairline);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--canvas);
      transition: border-color .12s, box-shadow .12s;
    }
    .roster-item:hover {
      box-shadow: 0 2px 8px rgba(20,20,19,.05);
    }
    .roster-item.signed { border-color: #b7e4c7; background: #f0fdf4; }
    .roster-item.dup { border-color: #f5c6cb; background: #fef2f2; }
    .roster-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .roster-name-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .roster-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .roster-dot.signed { background: var(--success); }
    .roster-dot.unsigned { background: var(--muted-soft); }
    .roster-dot.dup { background: var(--error); }
    .roster-student-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .roster-home-class {
      font-size: 10px;
      color: var(--muted-soft);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .roster-status {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 9999px;
      line-height: 1;
    }
    .roster-status.signed { color: #047857; background: #d1fae5; }
    .roster-status.unsigned { color: var(--muted); background: var(--surface-card); }
    .roster-status.dup { color: var(--error); background: #fecaca; }
    .roster-meta {
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .roster-meta-text {
      font-size: 10px;
      color: var(--muted-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .roster-meta-text .ip { color: var(--muted); }
    .roster-meta-text .time { color: #047857; }
    .roster-meta-text.dup .ip,
    .roster-meta-text.dup .time { color: var(--error); }
    .roster-meta-text .sep { color: var(--hairline); margin: 0 3px; }
    .roster-revoke {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid #f5c6cb;
      background: #fef2f2;
      color: var(--error);
      transition: background .12s;
    }
    .roster-revoke:hover { background: #fecaca; }
    .roster-empty {
      grid-column: 1 / -1;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted-soft);
      border: 1px dashed var(--hairline);
      border-radius: 8px;
    }

    /* === Sidebar === */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .sidebar-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid var(--hairline);
      overflow: hidden;
    }
    .sidebar-card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--hairline);
    }
    .sidebar-card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      margin: 0;
      letter-spacing: 0.3px;
    }
    .sidebar-card-body { padding: 12px 16px; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      transition: background .12s;
    }
    .sidebar-link:hover { background: var(--canvas); }
    .sidebar-link-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--body);
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background .12s;
    }
    .sidebar-btn:hover { background: var(--canvas); }
    .sidebar-btn.danger { color: var(--error); }
    .sidebar-btn.danger:hover { background: #fef2f2; }
    .sidebar-divider { height: 1px; background: var(--hairline); margin: 4px 0; }
    .sidebar-help {
      font-size: 11px;
      color: var(--muted-soft);
      line-height: 1.5;
      margin-top: 8px;
    }

    /* === Time Window === */
    .window-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--canvas);
      border: 1px solid var(--hairline);
      margin-bottom: 10px;
    }
    .window-status-label { font-size: 11px; color: var(--muted-soft); }
    .window-status-value { font-size: 12px; font-weight: 500; color: var(--body); }
    .window-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      background: none;
      border: 1px solid #f5d0b5;
      cursor: pointer;
      transition: background .12s;
    }
    .window-toggle:hover { background: #fef3ec; }
    .window-fields {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .window-field label {
      display: block;
      font-size: 11px;
      color: var(--muted-soft);
      margin-bottom: 4px;
    }

    /* === Sessions === */
    .session-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--hairline);
      transition: background .12s;
    }
    .session-item:last-child { border-bottom: none; }
    .session-item:hover { background: var(--canvas); }
    .session-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .session-label { font-size: 13px; font-weight: 500; color: var(--body); }
    .session-count { font-size: 11px; color: var(--muted-soft); margin-top: 2px; }
    .session-actions {
      display: flex;
      gap: 4px;
    }
    .session-action {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      background: none;
      transition: background .12s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    /* === Input === */
    .input-field {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--hairline);
      font-size: 13px;
      color: var(--ink);
      background: var(--canvas);
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .input-field::placeholder { color: var(--muted-soft); }
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(204,120,92,.12);
    }

    /* === Buttons === */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      cursor: pointer;
      border: none;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: var(--on-primary); }
    .btn-primary:hover { background: var(--primary-active); }
    .btn-secondary {
      background: var(--canvas);
      color: var(--ink);
      border: 1px solid var(--hairline);
    }
    .btn-secondary:hover { background: var(--surface-card); }

    /* === Toast === */
    .toast {
      position: fixed;
      top: 80px;
      right: 24px;
      z-index: 50;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(20,20,19,.12);
      transform: translateX(120%);
      transition: transform .25s ease;
    }
    .toast.show { transform: translateX(0); }
    .toast.ok { background: #f0fdf4; color: #047857; border: 1px solid #b7e4c7; }
    .toast.err { background: #fef2f2; color: #c64545; border: 1px solid #f5c6cb; }

    /* === Stats Panel === */
    .stats-panel {
      margin-bottom: 16px;
    }

    /* === Responsive === */
    @media (max-width: 900px) {
      .page-layout { grid-template-columns: 1fr; }
      .compact-banner { flex-direction: column; gap: 12px; align-items: flex-start; }
      .banner-stats { margin-left: 0; }
    }
    @media (max-width: 640px) {
      .compact-banner { flex-direction: column; gap: 12px; align-items: flex-start; }
      .banner-stats { margin-left: 0; width: 100%; justify-content: center; gap: 12px; }
      .roster-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-bar">
    <div class="header-inner">
      <div class="header-left">
        <a href="/teacher/classes" class="nav-link">
          <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回
        </a>
        <span style="color: var(--hairline);">|</span>
        <span class="page-title text-lg">{{ cls.name }}</span>
      </div>
      <div class="header-right">
        <form method="post" action="/teacher/logout" style="display: inline;">
          <button class="nav-action" type="submit">退出</button>
        </form>
      </div>
    </div>
  </header>

  <main style="max-width: 1300px; margin: 0 auto; padding: 20px 24px 48px;">

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Compact Banner -->
    <div class="compact-banner">
      <h1 class="banner-title">{{ cls.name }}</h1>
      <div class="banner-stats">
        <div class="banner-stat">
          <p class="banner-stat-label">总人数</p>
          <p id="totalCount" class="banner-stat-value">0</p>
        </div>
        <div class="banner-stat">
          <p class="banner-stat-label">已签到</p>
          <p id="signedCount" class="banner-stat-value accent">0</p>
        </div>
        <div class="banner-stat">
          <p class="banner-stat-label">未签到</p>
          <p id="absentCount" class="banner-stat-value muted">0</p>
        </div>
      </div>
    </div>

    <!-- Two Column Layout -->
    <div class="page-layout">

      <!-- Left: Sidebar -->
      <div class="sidebar">

        <!-- Quick Links -->
        <div class="sidebar-card">
          <div class="sidebar-card-header">
            <p class="sidebar-card-title">课堂工具</p>
          </div>
          <div class="sidebar-card-body" style="display: flex; flex-direction: column; gap: 2px;">
            <a href="/teacher/classes/{{ cls.id }}/seats" target="_blank" class="sidebar-link">
              <span class="sidebar-link-icon" style="background: #fef3ec; color: var(--primary);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
              </span>
              座位表
            </a>
            <a href="/teacher/classes/{{ cls.id }}/students" target="_blank" class="sidebar-link">
              <span class="sidebar-link-icon" style="background: var(--canvas); color: var(--muted);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </span>
              学生管理
            </a>
            <button id="statsToggle" class="sidebar-btn">
              <span class="sidebar-link-icon" style="background: var(--canvas); color: var(--muted);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
              </span>
              出勤统计
            </button>
            <button id="resetBtn" class="sidebar-btn">
              <span class="sidebar-link-icon" style="background: var(--canvas); color: var(--muted);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
              </span>
              归档重置
            </button>
          </div>
        </div>

        <!-- Time Window -->
        <div class="sidebar-card">
          <div class="sidebar-card-header" style="display: flex; align-items: center; justify-content: space-between;">
            <p class="sidebar-card-title">签到时间段</p>
            <button id="windowToggle" class="window-toggle" style="padding: 2px 6px; border: none; font-size: 11px;">
              <svg id="windowChevron" style="width:12px;height:12px;transition: transform .15s;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
          </div>
          <div id="windowBody" class="sidebar-card-body" style="display: none;">
            <div class="window-status">
              <span class="window-status-label">当前设置</span>
              <strong id="windowText" class="window-status-value">不限</strong>
            </div>
            <button id="windowFieldsToggle" class="window-toggle" style="width: 100%; justify-content: center;">
              <svg style="width:12px;height:12px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              设置时间
            </button>
            <div id="windowPanel" class="hidden window-fields">
              <div class="window-field">
                <label>开始时间</label>
                <input id="startTime" type="datetime-local" class="input-field" />
              </div>
              <div class="window-field">
                <label>结束时间</label>
                <input id="endTime" type="datetime-local" class="input-field" />
              </div>
              <div style="display: flex; gap: 6px;">
                <button id="saveWindow" class="btn btn-primary" style="flex:1;">保存</button>
                <button id="clearWindow" class="btn btn-secondary" style="flex:1;">清除</button>
              </div>
              <p class="sidebar-help">留空表示不限制，设置后立即生效。</p>
            </div>
          </div>
        </div>

        <!-- Data Management -->
        <div class="sidebar-card">
          <div class="sidebar-card-header">
            <p class="sidebar-card-title">数据管理</p>
          </div>
          <div class="sidebar-card-body" style="display: flex; flex-direction: column; gap: 2px;">
            <button id="importBtn" class="sidebar-btn">
              <span class="sidebar-link-icon" style="background: var(--canvas); color: var(--muted);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
              </span>
              导入名单
            </button>
            <a href="/api/export?classId={{ cls.id }}" class="sidebar-link">
              <span class="sidebar-link-icon" style="background: var(--canvas); color: var(--muted);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
              </span>
              导出签到记录
            </a>
            <a href="/api/stats/export?classId={{ cls.id }}" class="sidebar-link">
              <span class="sidebar-link-icon" style="background: var(--canvas); color: var(--muted);">
                <svg style="width:14px;height:14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
              </span>
              导出出勤统计
            </a>
          </div>
        </div>

      </div>

      <!-- Right: Main Content -->
      <div>
        <!-- Entry Card -->
        <a href="/student?classId={{ cls.id }}" target="_blank" class="entry-card">
          <div class="entry-icon">
            <svg style="width:24px;height:24px;color:var(--on-primary);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
          </div>
          <div class="entry-body">
            <p class="entry-title">学生签到入口</p>
            <p class="entry-url">/student?classId={{ cls.id }} <span style="margin-left: 4px; color: #6c6a64;">（点击新标签打开）</span></p>
          </div>
          <div class="entry-arrow">
            <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </div>
        </a>

        <!-- Stats Panel (hidden by default) -->
        <div id="statsPanel" class="hidden card stats-panel">
          <div class="card-header">
            <p class="card-title">出勤统计</p>
          </div>
          <div id="statsContent" style="padding: 24px; text-align: center; font-size: 13px; color: var(--muted-soft);">加载中...</div>
        </div>

        <!-- Message -->
        <div id="msg" class="hidden" style="margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;"></div>

        <!-- Roster -->
        <div class="card" style="margin-bottom: 16px;">
          <div class="card-header">
            <div style="display: flex; align-items: center; gap: 10px;">
              <p class="card-title">当前签到名单</p>
              <span id="rosterBadge" style="font-size: 11px; color: var(--muted-soft);"></span>
              <span id="rosterDate" style="font-size: 11px; color: var(--muted-soft);"></span>
            </div>
          </div>
          <div style="padding: 12px; background: var(--canvas);">
            <div id="rosterCompactGrid" class="roster-grid"></div>
          </div>
        </div>

        <!-- Sessions -->
        <div class="card">
          <div class="card-header">
            <p class="card-title">历史批次</p>
            <span id="sessionCount" style="font-size: 11px; color: var(--muted-soft);"></span>
          </div>
          <div id="sessionList">
            <div style="padding: 24px; text-align: center; font-size: 13px; color: var(--muted-soft);">暂无历史批次</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="importFile" accept=".xlsx,.xls" style="display: none;" />

  </main>

<script>
const CLASS_ID = {{ cls.id }}

function showToast(text, ok = true) {
  const t = document.getElementById('toast')
  t.textContent = text
  t.className = `toast ${ok ? 'ok' : 'err'} show`
  setTimeout(() => t.classList.remove('show'), 2500)
}

async function parseResponse(res) {
  if (res.status === 401) { window.location.href = '/student'; return null }
  if (!res.ok) { const t = await res.text(); console.error('API error', res.status, t); return null }
  return res.json()
}

function formatHomeClass(homeClass) {
  const value = String(homeClass || '').trim()
  if (!value) return ''
  return value.includes('班') ? value : `${value}班`
}

function formatRosterDate(value) {
  const date = value ? new Date(value) : new Date()
  if (Number.isNaN(date.getTime())) return ''
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']
  const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
  const w = weekdays[date.getDay()]
  const m = months[date.getMonth()]
  const d = date.getDate()
  const y = date.getFullYear()
  const hh = String(date.getHours()).padStart(2, '0')
  const mm = String(date.getMinutes()).padStart(2, '0')
  return `${w} ${m}${d}日 ${y}年 ${hh}:${mm}`
}

function formatSignedTime(value) {
  if (!value) return '-'
  const date = new Date(value)
  if (Number.isNaN(date.getTime())) {
    const match = String(value).match(/(\d{2}:\d{2}:\d{2})/)
    return match ? match[1] : String(value)
  }
  return date.toLocaleTimeString('zh-CN', { hour12: false })
}

function renderRosterCompact(roster, ipCount) {
  const grid = document.getElementById('rosterCompactGrid')
  grid.innerHTML = ''

  if (!roster || !roster.length) {
    grid.innerHTML = '<div class="roster-empty">暂无学生</div>'
    return
  }

  roster.forEach(r => {
    const isSigned = r.status === '已签到'
    const dupIp = ipCount[(r.computerName || '').trim()] > 1
    const itemClass = dupIp ? 'dup' : isSigned ? 'signed' : ''
    const dotClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusClass = dupIp ? 'dup' : isSigned ? 'signed' : 'unsigned'
    const statusText = dupIp ? '重复IP' : isSigned ? '已签到' : '未签到'
    const metaClass = dupIp ? 'dup' : ''

    const revokeBtn = (isSigned && r.recordId)
      ? `<button onclick="revokeRecord(${r.recordId})" class="roster-revoke">撤销</button>`
      : ''

    const item = document.createElement('div')
    item.className = `roster-item ${itemClass}`
    item.innerHTML = `
      <div class="roster-line">
        <div class="roster-name-wrap">
          <span class="roster-dot ${dotClass}"></span>
          <span class="roster-student-name">${r.studentName}</span>
          <span class="roster-home-class">${formatHomeClass(r.homeClass)}</span>
        </div>
        <span class="roster-status ${statusClass}">${statusText}</span>
      </div>
      <div class="roster-meta">
        <span class="roster-meta-text ${metaClass}"><span class="ip">${r.computerName || '-'}</span><span class="sep">/</span><span class="time">${isSigned ? formatSignedTime(r.signedAt) : '-'}</span></span>
        ${revokeBtn}
      </div>`
    grid.appendChild(item)
  })
}

async function refreshStatus() {
  const res = await fetch(`/api/status?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  if (!Array.isArray(data.roster)) return

  const total = data.totalCount, signed = data.signedCount
  document.getElementById('totalCount').textContent = total
  document.getElementById('signedCount').textContent = signed
  document.getElementById('absentCount').textContent = data.absentCount
  document.getElementById('rosterBadge').textContent = `共 ${total} 人`
  const firstSignedAt = data.roster.find(r => r.signedAt)?.signedAt
  document.getElementById('rosterDate').textContent = formatRosterDate(firstSignedAt)

  const wt = document.getElementById('windowText')
  wt.textContent = (data.window.start || data.window.end)
    ? `${data.window.start || '不限'} 至 ${data.window.end || '不限'}`
    : '不限'

  const ipCount = {}
  data.roster.forEach(r => { const ip = (r.computerName||'').trim(); if (ip && ip!=='-') ipCount[ip]=(ipCount[ip]||0)+1 })
  renderRosterCompact(data.roster, ipCount)
}

async function refreshSessions() {
  const res = await fetch(`/api/sessions?classId=${CLASS_ID}`)
  const data = await parseResponse(res)
  if (!data) return
  const list = document.getElementById('sessionList')
  document.getElementById('sessionCount').textContent = data.length ? `共 ${data.length} 批次` : ''
  if (!data.length) { list.innerHTML = '<div style="padding: 24px; text-align: center; font-size: 13px; color: var(--muted-soft);">暂无历史批次</div>'; return }
  list.innerHTML = data.map(s => `
    <div class="session-item">
      <div class="session-head">
        <div>
          <p class="session-label">${s.label}</p>
          <p class="session-count">签到人数：${s.count}</p>
        </div>
        <div class="session-actions">
          <a href="/teacher/sessions/${s.id}/seats"
            class="session-action" style="color: var(--primary);" onmouseover="this.style.background='#fef3ec'" onmouseout="this.style.background=''">座位表</a>
          <a href="/api/sessions/${s.id}/export"
            class="session-action" style="color: var(--success);" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background=''">导出</a>
          <button onclick="deleteSessionItem(${s.id}, this.dataset.label)" data-label="${s.label.replace(/"/g,'&quot;')}"
            class="session-action" style="color: var(--error);" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background=''">删除</button>
        </div>
      </div>
    </div>`).join('')
}

async function deleteSessionItem(sessionId, label) {
  if (!confirm(`确认删除历史批次「${label}」？此操作不可恢复。`)) return
  const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' })
  const data = await parseResponse(res)
  if (!data) return
  showToast(data.message || '历史批次已删除', true)
  await refreshSessions()
  const statsPanel = document.getElementById('statsPanel')
  if (!statsPanel.classList.contains('hidden')) {
    await loadStats()
  }
}

document.getElementById('statsToggle').addEventListener('click', async () => {
  const panel = document.getElementById('statsPanel')
  panel.classList.toggle('hidden')
  if (!panel.classList.contains('hidden')) await loadStats()
})

async function loadStats() {
  const content = document.getElementById('statsContent')
  content.innerHTML = '<div style="padding: 24px; text-align: center; font-size: 13px; color: var(--muted-soft);">加载中...</div>'
  const res = await fetch('/api/stats?classId=' + CLASS_ID)
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.students || !data.students.length) {
    content.innerHTML = '<div style="padding: 24px; text-align: center; font-size: 13px; color: var(--muted-soft);">暂无历史批次数据</div>'; return
  }
  content.innerHTML = `<div style="overflow-x: auto;">
    <table style="width: 100%; font-size: 13px; border-collapse: collapse;">
      <thead><tr style="border-bottom: 1px solid var(--hairline);">
        <th style="text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 500; color: var(--muted-soft);">姓名</th>
        <th style="text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 500; color: var(--muted-soft);">行政班级</th>
        <th style="text-align: center; padding: 10px 16px; font-size: 11px; font-weight: 500; color: var(--muted-soft);">签到</th>
        <th style="text-align: center; padding: 10px 16px; font-size: 11px; font-weight: 500; color: var(--muted-soft);">缺勤</th>
        <th style="text-align: center; padding: 10px 16px; font-size: 11px; font-weight: 500; color: var(--muted-soft);">出勤率</th>
      </tr></thead>
      <tbody>${data.students.map(s => {
        const rate = parseFloat(s.rate)
        const color = rate >= 80 ? 'var(--success)' : rate >= 60 ? 'var(--warning)' : 'var(--error)'
        return `<tr style="border-bottom: 1px solid var(--hairline);" onmouseover="this.style.background='var(--canvas)'" onmouseout="this.style.background=''">
          <td style="padding: 10px 16px; font-weight: 500; color: var(--ink);">${s.name}</td>
          <td style="padding: 10px 16px; font-size: 12px; color: var(--muted-soft);">${formatHomeClass(s.homeClass)}</td>
          <td style="padding: 10px 16px; text-align: center; color: var(--body);">${s.signedCount}</td>
          <td style="padding: 10px 16px; text-align: center; color: var(--muted-soft);">${s.absentCount}</td>
          <td style="padding: 10px 16px; text-align: center; font-weight: 500; color: ${color};">${s.rate}%</td>
        </tr>`
      }).join('')}</tbody>
    </table>
    <p style="padding: 10px 16px; font-size: 11px; color: var(--muted-soft); border-top: 1px solid var(--hairline);">共 ${data.totalSessions} 个历史批次</p>
  </div>`
}

async function revokeRecord(recordId) {
  if (!confirm('确认撤销该签到记录？')) return
  const res = await fetch('/api/signin/' + recordId, { method: 'DELETE' })
  if (res.status === 401) { window.location.href = '/student'; return }
  const data = await res.json()
  if (!data.ok) { showToast(data.message, false); return }
  showToast('已撤销')
  refreshStatus()
}

document.getElementById('windowToggle').addEventListener('click', () => {
  const body = document.getElementById('windowBody')
  const chevron = document.getElementById('windowChevron')
  const isHidden = body.style.display === 'none'
  body.style.display = isHidden ? '' : 'none'
  chevron.style.transform = isHidden ? 'rotate(180deg)' : ''
})

document.getElementById('windowFieldsToggle').addEventListener('click', () => {
  const panel = document.getElementById('windowPanel')
  panel.classList.toggle('hidden')
})

document.getElementById('saveWindow').addEventListener('click', async () => {
  const res = await fetch('/api/window', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, start_time: document.getElementById('startTime').value||null, end_time: document.getElementById('endTime').value||null })
  })
  const data = await parseResponse(res)
  if (!data) return
  showToast(data.message, data.ok)
  refreshStatus()
})

document.getElementById('clearWindow').addEventListener('click', async () => {
  document.getElementById('startTime').value = ''
  document.getElementById('endTime').value = ''
  const res = await fetch('/api/window', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID, start_time: null, end_time: null })
  })
  const data = await parseResponse(res)
  if (!data) return
  showToast('已清除时间限制', data.ok)
  refreshStatus()
})

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('确认归档当前签到记录并重置？')) return
  const res = await fetch('/api/reset', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ classId: CLASS_ID })
  })
  const data = await parseResponse(res)
  if (!data) return
  showToast(data.message, data.ok)
  refreshStatus()
  refreshSessions()
})

document.getElementById('importBtn').addEventListener('click', () => {
  document.getElementById('importFile').click()
})
document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const fd = new FormData()
  fd.append('file', file)
  fd.append('classId', CLASS_ID)
  showToast('导入中...', true)
  const res = await fetch('/api/import', { method: 'POST', body: fd })
  const data = await parseResponse(res)
  e.target.value = ''
  if (!data) return
  showToast(data.message, data.ok)
  if (data.ok) refreshStatus()
})

refreshStatus()
refreshSessions()
setInterval(refreshStatus, 4000)
</script>
</body>
</html>
